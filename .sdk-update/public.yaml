          description: 'Limit to requests the caller can `view`, requests they can `approve`, or only their own requests via `myRequests`. Defaults to `view`.'
          schema:
            type: string
            default: view
            enum:
              - view
              - approve
              - myRequests
        -
          name: employeeId
          in: query
          description: 'A particular employee ID to limit the response to.'
          schema:
            type: integer
        -
          name: start
          in: query
          description: "The left boundary of the search window, in YYYY-MM-DD format. Returns any request whose end date falls on or after this date — i.e., requests that are still active at the start of your window. To find all requests overlapping a date range, pass your range start here. Note: this parameter filters on each request's *end* date, not its start date."
