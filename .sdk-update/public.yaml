            application/json:
              schema:
                $ref: '#/components/schemas/ListFieldDetail'
            text/xml:
              schema:
                $ref: '#/components/schemas/ListFieldDetail'
        '400':
          description: 'The request body is invalid or malformed.'
        '403':
          description: 'The list is not editable, or the API user does not have sufficient permissions.'
        '404':
          description: 'The specified list field or option ID does not exist.'
        '405':
          description: 'One or more of the specified options belong to a non-manageable list field and cannot be modified.'
