          oneOf:
            -
              type: string
              format: date-time
            -
              type: 'null'
      type: object
    Scheduling-UpdateScheduleRequest-V1:
      description: 'Request object for updating a schedule'
      properties:
        name:
          description: 'The name of the schedule'
          type: string
          example: 'Morning Shift'
        locationId:
          description: 'The ID of the location the schedule belongs to'
          type: integer
          example: 1
        timezone:
          description: 'The timezone of the schedule. Required if location does not have a timezone. Error if location already has a timezone.'
          type: string
          example: America/Denver
        startOfWeek:
          description: 'The starting day of the week for the schedule'
