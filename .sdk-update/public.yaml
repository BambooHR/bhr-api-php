 deductions (e.g., 'Gross'), or null.", oneOf: [{ type: string }, { type: 'null' }] }, employeeCapAmount: { description: 'The cap on employee deductions, or null if none.', oneOf: [{ type: number }, { type: 'null' }] }, employeeCapAmountType: { description: 'The unit for employeeCapAmount, or null.', oneOf: [{ type: string }, { type: 'null' }] }, employeeAnnualMax: { description: 'The annual maximum employee contribution, or null if none.', oneOf: [{ type: number }, { type: 'null' }] }, companyAmount: { description: 'The employer-paid contribution amount.', oneOf: [{ type: number }, { type: 'null' }] }, companyAmountType: { description: "The unit for companyAmount (e.g., '%', '$').", oneOf: [{ type: string }, { type: 'null' }] }, companyPercentBasedOn: { description: "The basis for percent-based employer contributions (e.g., 'Gross'), or null.", oneOf: [{ type: string }, { type: 'null' }] }, companyCapAmount: { description: 'The cap on employer contributions, or null if none.', oneOf: [{ type: number }, { type: 'null' }] }, companyCapAmountType: { description: 'The unit for companyCapAmount, or null.', oneOf: [{ type: string }, { type: 'null' }] }, companyAnnualMax: { description: 'The annual maximum employer contribution, or null if none.', oneOf: [{ type: number }, { type: 'null' }] }, occurrencesPerYear: { description: "The number of deduction occurrences per year based on the employee's pay schedule.", type: integer } }, type: object } } }, type: object } }
