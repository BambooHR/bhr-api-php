              schema:
                title: MemberBenefitEventsResponse
                properties:
                  members: { description: 'List of member benefit event records, one entry per employee or dependent.', type: array, items: { $ref: '#/components/schemas/MemberBenefitEvent' } }
                type: object
        '401':
