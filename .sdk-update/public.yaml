          schema:
            type: string
        -
          name: format
          in: query
          description: 'Set to "json" to receive JSON output as an alternative to using the Accept header.'
          required: false
          schema:
            type: string
            enum:
              - json
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListFieldValues'
          text/xml:
            schema:
              $ref: '#/components/schemas/ListFieldValuesXml'
      responses:
        '200':
          description: 'All requested changes were applied. Returns the full updated list.'
