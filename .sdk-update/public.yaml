  '/api/v1/new-hire-packets/{id}/question-visibility':
    put:
      tags:
        - Onboarding
        - 'Public API'
      summary: 'Update GTKY answer visibility for a new hire packet'
      description: 'Shows or hides get-to-know-you (GTKY) question answers for the packet. Omit questionIds to toggle all answers (same as the legacy BFF POST /onboarding/questions/visibility/{newHirePacketId} with a visible query flag). Send questionIds to toggle only specific personal questions linked to this new hire packet. Requires the same edit access as other NHP writes. When the employee has a hire date set, updates are rejected once the company-local calendar date is on or after that date (same rule as GET /onboarding/questions/{newHirePacketId}, which redirects to expired in that case). Draft employees without a hire date are not blocked.'
      operationId: update-new-hire-packet-gtky-answer-visibility
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              title: NewHirePacketGtkyAnswerVisibilityRequest
              required:
                - hidden
              properties:
                hidden:
                  description: 'When true, answers are hidden from typical manager views; when false, answers are shown.'
                  type: boolean
                questionIds:
                  description: 'Optional. When omitted or null, hidden applies to every GTKY answer row for the packet. When a non-empty array of employee personal question ids, only those questions (must belong to this packet) are updated.'
                  oneOf: [{ type: array, items: { type: integer, format: int64 } }, { type: 'null' }]
              type: object
      responses:
        '200':
          description: 'Success — returns the current visibility for each GTKY answer row on the packet.'
          content:
            application/json:
              schema:
                title: NewHirePacketGtkyAnswerVisibilityResponse
                required:
                  - gtkys
                properties:
                  gtkys: { description: 'GTKY personal-question answer rows with visibility flags.', type: array, items: { title: NewHirePacketGtkyAnswerVisibilityItem, required: [responseId, questionId, hidden], properties: { responseId: { type: integer, format: int64 }, questionId: { type: integer, format: int64 }, hidden: { type: boolean } }, type: object } }
                type: object
        '400':
          description: 'Bad request — invalid body (e.g. hidden type, questionIds shape, ids not linked to this packet), or visibility change not allowed on or after the employee hire date when a hire date is set'
        '403':
          description: Forbidden
        '404':
          description: 'Not found'
        '500':
          description: 'Internal server error'
      security:
        -
          oauth:
            - onboarding.write
