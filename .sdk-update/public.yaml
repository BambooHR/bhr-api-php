      summary: 'List Goals'
      description: 'Returns goals for an employee. Use this endpoint to locate goals by title before updating, commenting on, closing, reopening, or deleting them. Use `filter=status-inProgress` when the user asks for current/active goals, `filter=status-completed` for completed goals, `filter=status-closed` for closed goals, and `filter=status-all` when the user says "all goals", "including closed", or you are resolving a goal by title for a write operation where the status is unknown. If no filter is provided, closed goals are excluded. Results are capped at 50 goals; if a title lookup is ambiguous or absent, do not update or delete a different goal.'
      operationId: list-goals
      parameters:
        -
          name: employeeId
          in: path
          description: 'employeeId is the employee ID to whom the goals are assigned.'
          required: true
          schema:
            type: string
        -
          name: filter
          in: query
          description: 'Goal status filter. Use `status-inProgress` for current active goals, `status-completed` for completed goals, `status-closed` for closed goals, and `status-all` when locating a goal by title for update/delete/reopen or when the user asks for all goals. If omitted, closed goals are excluded. Unrecognized values behave like omission.'
          schema:
            type: string
            enum:
              - status-inProgress
              - status-completed
              - status-closed
              - status-all
      responses:
        '200':
          description: 'The response content will be a JSON document with the requested information.'
          content:
            application/json:
              schema:
                title: GoalsList
                properties:
                  goals: { description: 'All goals of the selected employee', type: array, items: { $ref: '#/components/schemas/TransformedApiGoal' } }
                type: object
