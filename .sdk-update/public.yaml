            task:
              properties:
                id:
                  type: integer
                name:
                  type: string
              oneOf:
                -
                  type: object
                -
                  type: 'null'
          oneOf:
            -
              type: object
            -
              type: 'null'
        shiftDifferential:
          description: 'Shift differential information associated with this time tracking record'
          properties:
            id:
              description: 'Shift Differential information'
              type: integer
            name:
              type: string
          oneOf:
            -
              type: object
            -
              type: 'null'
      type: object
    FieldOptionsRequestSchema:
      description: 'Schema for field options request'
      required:
        - fields
      properties:
        fields:
          description: 'List of field names to get options for'
          type: array
          items:
            type: string
          example:
            - field_name1
            - field_name2
        dependentFields:
          description: 'Dependent fields and their values that affect the options of the requested fields'
          example:
            field_name1:
              -
                field: field_name2
                value: 123
          oneOf:
            -
              type: object
              additionalProperties:
                type: array
                items:
                  properties: { field: { type: string }, value: { type: string } }
                  type: object
            -
              type: 'null'
        filters:
          description: 'Optional filters to apply when retrieving field options. Filters limit the returned options based on other field values. The object contains a `match` key (`all` or `any`) and a `filters` array of objects with `field`, `operator`, and `value` keys.'
          example:
            match: all
            filters:
              -
                field: employee_status
                operator: includes
                value:
                  - Active
          oneOf:
            -
              type: object
            -
              type: 'null'
      type: object
    Employee:
      title: 'Employee when updating'
      description: 'A dictionary of employee field names and their new values. The properties listed below are commonly used fields, but any valid writable employee field name can be used as a key. To discover all available field names, call the List Fields endpoint (operationId: list-fields, GET /api/v1/meta/fields). Only the fields you include will be updated; omitted fields are left unchanged. Some string-valued fields are backed by lists or lookups, so callers should use valid option values from BambooHR metadata rather than assuming any free-text string will persist as entered. **Important for AI agents:** Unknown or misspelled field names are silently ignored — the endpoint returns 200 but the field is not updated. Always use the exact alias from the schema properties below or from the list-fields endpoint; do not invent aliases by adding prefixes such as `home` (e.g., `homeCity` is wrong — the correct alias is `city`). Photo data is not writable through this schema: photo-related keys are silently ignored. Use the Upload Employee Photo endpoint (operationId: upload-employee-photo) to change a profile photo.'
      properties:
        firstName:
          description: 'Legal first name.'
          type: string
        lastName:
          description: 'Legal last name.'
          type: string
        workEmail:
          description: 'Work email address.'
          type: string
        jobTitle:
          description: 'Job title.'
          type: string
        department:
          description: 'Department name.'
          type: string
        division:
          description: 'Division name.'
          type: string
        location:
          description: 'Location name.'
          type: string
        hireDate:
          description: 'Hire date in YYYY-MM-DD format.'
          type: string
          format: date
        mobilePhone:
          description: 'Mobile phone number.'
          type: string
        homePhone:
          description: 'Home phone number.'
          type: string
        workPhone:
          description: 'Work phone number.'
          type: string
        address1:
          description: 'Home street address line 1. The correct alias is `address1` — do not use `homeAddress1`, `homeStreet1`, or `street1`.'
          type: string
        address2:
          description: 'Home street address line 2 (apartment, suite, etc.). The correct alias is `address2` — do not use `homeAddress2` or `homeStreet2`.'
          type: string
        city:
          description: 'Home city. The correct alias is `city` — do not use `homeCity`.'
          type: string
        state:
          description: 'Home state or province. The correct alias is `state` — do not use `homeState`. Values are normalized to standard abbreviations (e.g., "Pennsylvania" becomes "PA").'
          type: string
        zipcode:
          description: 'Home ZIP or postal code. The correct alias is `zipcode` — do not use `homeZipcode` or `homeZip`.'
          type: string
        country:
          description: 'Home country name. The correct alias is `country` — do not use `homeCountry`.'
          type: string
      type: object
      example:
        firstName: Panda
        lastName: Bear
        workEmail: panda.bear@example.com
        jobTitle: 'Software Engineer'
        department: Engineering
      additionalProperties:
        anyOf:
          -
            type: string
          -
            type: number
          -
            type: boolean
          -
            type: integer
          -
            type: array
            items:
              anyOf:
                -
                  type: string
                -
                  type: number
                -
                  type: boolean
                -
                  type: integer
                -
                  type: object
                  additionalProperties: true
                -
                  type: 'null'
          -
            type: object
            additionalProperties: true
          -
            type: 'null'
    postNewEmployee:
      title: 'New Employee'
      description: 'A dictionary of employee field names and their values for the new employee. At minimum, firstName and lastName are required. The properties listed below are commonly used fields, but any valid writable employee field name can be used as a key. To discover all available field names, call the List Fields endpoint (operationId: list-fields, GET /api/v1/meta/fields). Additional fields may use string, number, boolean, array, object, or null values depending on the field type. Some string-valued fields are backed by lists or lookups, so callers should use valid option values from BambooHR metadata rather than assuming any free-text string will persist as entered. Photo data is not writable through this schema: photo-related keys are silently ignored. After creation, use the Upload Employee Photo endpoint (operationId: upload-employee-photo) to attach a profile photo.'
      required:
        - firstName
        - lastName
      properties:
        firstName:
          description: 'Legal first name (required).'
          type: string
        lastName:
          description: 'Legal last name (required).'
          type: string
        workEmail:
          description: 'Work email address.'
          type: string
        jobTitle:
          description: 'Job title.'
          type: string
        department:
          description: 'Department name.'
          type: string
        hireDate:
          description: 'Hire date in YYYY-MM-DD format.'
          type: string
          format: date
      type: object
      example:
        firstName: Panda
        lastName: Bear
        jobTitle: 'Software Engineer'
        department: Engineering
      additionalProperties:
        anyOf:
          -
            type: string
          -
            type: number
          -
            type: boolean
          -
            type: integer
          -
            type: array
            items:
              anyOf:
                -
                  type: string
                -
                  type: number
                -
                  type: boolean
                -
                  type: integer
                -
                  type: object
                  additionalProperties: true
                -
                  type: 'null'
          -
            type: object
            additionalProperties: true
          -
            type: 'null'
    ListFieldValues:
      title: 'Create or Update List Field Values'
      description: 'Payload for creating, updating, or archiving options on a list field.'
      properties:
        options:
          description: 'The list field options to create, update, or archive.'
          type: array
          items:
            properties:
              id:
                description: 'The existing option ID. Omit this field to create a new option. Required when archiving an existing option.'
                type: integer
              value:
                description: 'The display value for the option. Required when creating a new option (i.e., when id is omitted).'
                type: string
              archived:
                description: 'Whether the option should be archived. Use `yes` to soft-delete an option or `no` to reactivate a previously archived option. Archived options continue to appear in GET responses for historical data integrity.'
                type: string
                enum:
                  - 'yes'
                  - 'no'
              adpCode:
                description: 'Optional payroll-mapping code associated with the option.'
                type: string
            type: object
      type: object
    ListFieldValuesXml:
      title: 'Create or Update List Field Values (XML)'
      description: 'XML payload for creating, updating, or archiving options on a list field. The root element is <options>, containing one or more <option> elements. Each <option> element carries optional id, archived, and adpCode XML attributes; the display value is the text content of the element.'
      properties:
        option:
          description: 'One or more options to create, update, or archive.'
          type: array
          items:
            properties:
              id:
                description: 'The existing option ID. Omit to create a new option. Required when archiving.'
                type: integer
                xml:
                  attribute: true
              value:
                description: 'The display value for the option. In XML format, this is the text content of the <option> element.'
                type: string
              archived:
                description: 'Whether to archive this option. Use yes to soft-delete or no to reactivate.'
                type: string
                enum:
                  - 'yes'
                  - 'no'
                xml:
                  attribute: true
              adpCode:
                description: 'Optional payroll-mapping code.'
                type: string
                xml:
                  attribute: true
            type: object
            xml:
              name: option
          xml:
            name: option
            wrapped: false
      type: object
      xml:
        name: options
    TimeOffRequest:
      title: 'Create Time Off Request'
      required:
        - status
        - start
        - end
        - timeOffTypeId
      properties:
        status:
          description: 'The initial status of the request.'
          type: string
          enum:
            - approved
            - denied
            - declined
            - requested
        start:
          description: 'Start date in YYYY-MM-DD format.'
          type: string
          format: date
        end:
          description: 'End date in YYYY-MM-DD format. Must be on or after the start date.'
          type: string
          format: date
        timeOffTypeId:
          description: 'The ID of the time off type for this request.'
          type: integer
        amount:
          description: 'Total hours or days requested. Ignored when `dates` array is provided (sum of daily amounts is used instead).'
          type: number
        previousRequest:
          description: 'The ID of a previous time off request to supersede. The previous request will be cancelled.'
          type: integer
        notes:
          description: 'Optional notes from the employee or manager.'
          type: array
          items:
            properties:
              from:
                description: 'Who the note is from.'
                type: string
                enum:
                  - employee
                  - manager
              note:
                description: 'The note text.'
                type: string
            type: object
        dates:
          description: 'Optional per-day breakdown. When provided, the top-level `amount` is ignored and the sum of daily amounts is used.'
          type: array
          items:
            properties:
              ymd:
                description: 'Date in YYYY-MM-DD format.'
                type: string
                format: date
              amount:
                description: 'Hours or days for this date.'
                type: number
            type: object
      type: object
    request:
      title: 'Request Status'
      required:
        - status
      properties:
        status:
          description: 'The new status for the time off request.'
          type: string
          enum:
            - approved
            - denied
            - declined
            - canceled
            - cancelled
        note:
          description: 'A note to attach to the change in status.'
          type: string
      type: object
      example:
        status: approved
        note: 'Looks good, approved!'
    TimeOffHistory:
      required:
        - date
      properties:
        date:
          description: 'The date for the history item in YYYY-MM-DD format.'
          type: string
          format: date
        eventType:
          description: 'The type of history event. Defaults to `used` for the /history path and `override` for the /balance_adjustment path when omitted.'
          type: string
          enum:
            - used
            - override
        timeOffRequestId:
          description: 'The ID of an approved time off request. Required when eventType is `used`.'
          type: integer
        timeOffTypeId:
          description: 'The ID of the time off type. Required when eventType is `override`.'
          type: integer
        amount:
          description: 'The number of hours/days to record. Required when eventType is `override`.'
          type: number
        note:
          description: 'An optional note to show in history.'
          type: string
      type: object
    AdjustTimeOffBalance:
      required:
        - amount
        - date
        - timeOffTypeId
      properties:
        date:
          description: 'The date the adjustment should be added in history. Should be in ISO8601 date format (YYYY-MM-DD).'
          type: string
          format: date
        timeOffTypeId:
          description: 'The ID of the time off type to add a balance adjustment for.'
          type: integer
        amount:
          description: 'The number of hours/days to adjust the balance by.'
          type: number
        note:
          description: 'This is an optional note to show in history.'
          type: string
      type: object
    PostNewEmployeeFileCategory:
