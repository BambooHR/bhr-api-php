  /api/v1/employees/directory:
    get:
      tags:
        - Employees
        - 'Public API'
      summary: 'Get Employees Directory'
      description: "Returns the company's published employee directory: a fieldset definition plus an array of employee records whose keys match the field ids. Coverage is intentionally incomplete — companies can hide individual employees (commonly contractors) from the directory, and those employees are silently absent from the response with no indicator that they exist. The fieldset is also fixed by company directory configuration; callers cannot request additional fields. Use this endpoint only when you specifically want the company's curated directory subset (for example, an org-style listing that respects the company's directory settings). For complete or general-purpose employee listings, batch lookups by ID, or filtering by name/status, use **List Employees** (`list-employees`) instead. For tabular reporting, custom field selection, or analytical queries across many employees, use **Get Data from Dataset (v2)** (`get-data-from-dataset-v2`) instead. Response format follows the `Accept` header: `application/json` returns a JSON object with `fields` and `employees` arrays; `application/xml` (the default when `Accept` is missing or any non-JSON value) returns a `<directory>` document with `<fieldset>` and `<employees>` children. Employee `id` values are returned as strings in both formats. The response shape varies by caller permission and per-company configuration: when neither company-wide directory sharing nor org-chart sharing is enabled the endpoint returns 403; when only org-chart sharing is enabled the response uses a reduced fieldset (limited to the fields exposed by the org chart); when the resulting directory has no employees the endpoint returns 404 rather than an empty list."
      operationId: get-employees-directory
      parameters:
        -
          $ref: '#/components/parameters/AcceptHeaderParameter'
        -
          name: onlyCurrent
          in: query
          description: 'When true (the default), only employees whose hire date and employment-status effective date are on or before today are returned. Set to false to also include employees with a future hire date or future employment-status effective date (typically pre-boarding hires). The fieldset is unaffected.'
          required: false
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: 'Directory fieldset and matching employee records, encoded per the `Accept` header.'
          content:
            application/json:
              schema:
                title: EmployeesDirectoryJsonResponse
                properties:
                  fields: { description: 'Field definitions included in this response. Each entry describes one key that appears on every employee object. The set of fields is fixed by company directory configuration; the `canUploadPhoto` entry is always appended.', type: array, items: { properties: { id: { description: 'Field identifier; appears as a key on each employee object.', type: string }, type: { description: 'Field data type. Observed values include `text`, `list`, `email`, `bool`, `url`, and `employee`.', type: string }, name: { description: 'Human-readable field label.', type: string } }, type: object } }
                  employees: { description: 'One object per directory employee. Every object includes `id` (employee ID as a string) and `canUploadPhoto` (1 if the authenticated caller may upload a photo for this employee, 0 otherwise), plus one key per entry in `fields`. The exact key set varies with company directory configuration. Field values are returned in the JSON type indicated by the matching `fields[].type` (for example, `bool` fields are JSON booleans).', type: array, items: { type: object, additionalProperties: true } }
                type: object
            application/xml:
              schema:
                title: EmployeesDirectoryXmlResponse
                properties:
                  fieldset: { description: 'Field definitions included in this response.', properties: { field: { type: array, items: { properties: { id: { description: 'Field identifier; matches the `id` attribute on each `<field>` element inside `<employee>`.', type: string, xml: { attribute: true } }, value: { description: "Human-readable field label, serialized as the element's text content.", type: string } }, type: object } } }, type: object }
                  employees: { description: 'Directory employee records.', properties: { employee: { type: array, items: { properties: { id: { description: 'Employee ID, serialized as an attribute on the `<employee>` element.', type: string, xml: { attribute: true } }, field: { description: 'Field values for the employee. Each `<field>` element has an `id` attribute matching one of the `<fieldset>` ids and the value as element text. Currency fields additionally carry a `currency` attribute (ISO currency code). Boolean fields are serialized as the strings `true`/`false`; the appended `canUploadPhoto` field is serialized as `yes`/`no`.', type: array, items: { properties: { id: { description: 'Field identifier matching one of the ids in `<fieldset>`.', type: string, xml: { attribute: true } }, value: { description: 'Field value serialized as element text content.', type: string } }, type: object } } }, type: object } } }, type: object }
                type: object
                xml:
                  name: directory
        '401':
          description: Unauthorized.
        '403':
          description: "The authenticated user's company has neither company-wide directory sharing nor org-chart sharing enabled, so no directory is available."
        '404':
          description: 'The resulting directory is empty (no employees matched the filter for this company configuration).'
        '500':
          description: 'Internal server error.'
      security:
        -
          basic: []
        -
          oauth:
            - employee_directory
  /api/v1/files/view:
    get:
      tags:
        - 'Company Files'
        - 'Public API'
      summary: 'Get Company Files and Categories'
      description: 'Returns all company file categories and the files within each category that the requesting user is permitted to see. The response format is determined by the `Accept` request header: send `application/json` for JSON or omit it (or send `application/xml`) for XML.'
      operationId: list-company-files
