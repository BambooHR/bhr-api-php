    Project-PaginatedResponseData-V1:
      description: 'Pagination envelope shared by paginated Project endpoints.'
      properties:
        meta:
          description: 'Pagination metadata.'
          required:
            - totalItems
            - totalPages
            - page
            - pageSize
          properties:
            totalItems:
              type: integer
              example: 100
            totalPages:
              type: integer
              example: 2
            page:
              type: integer
              example: 1
            pageSize:
              type: integer
              example: 50
          type: object
        _links:
          description: 'Pagination links. Keys are omitted when there is no previous/next page.'
          properties:
            prev:
              description: 'Link object for the previous page. Omitted on the first page.'
              properties:
                href:
                  type: string
              type: object
            next:
              description: 'Link object for the next page. Omitted on the last page.'
