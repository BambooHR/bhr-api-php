        -
          basic: []
        -
          oauth:
            - goal
    post:
      tags:
        - Goals
        - 'Public API'
      summary: 'Create Goal'
      description: 'Create a new goal for an employee. To create a simple goal without milestones, omit the `milestones` field; the goal''s progress can then be changed with `update-goal-progress`. To create a milestone-based goal, provide `milestones` as a non-empty array of `{ "title": string }` objects; the goal''s percent complete is then derived from milestone completion and should be changed via `update-goal-milestone-progress`. Sending `milestones: null` is treated as omitted (creates a simple goal).'
      operationId: create-goal
      parameters:
        -
          name: employeeId
          in: path
          description: 'employeeId is the employee ID with whom the goal is associated.'
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - title
                - dueDate
                - sharedWithEmployeeIds
              properties:
                title:
                  description: 'The title of the goal'
                  type: string
                  example: 'New Goal To update'
                description:
                  description: 'A detailed description of the goal'
                  type: string
                  example: 'This should be fun!'
                dueDate:
                  description: 'The due date for the goal in YYYY-MM-DD format'
                  type: string
                  format: date
                  example: '2025-12-17'
                percentComplete:
                  description: 'Initial percentage of completion for a simple goal (0-100). Defaults to 0 if omitted. Ignored when `milestones` is provided; milestone-based goals derive percent complete from milestone completion and should be updated via `update-goal-milestone-progress`.'
                  type: integer
                  maximum: 100
                  minimum: 0
                  example: 0
                completionDate:
                  description: 'The date when the goal was completed in YYYY-MM-DD format. Only valid when percentComplete is 100; providing this field with any other percentComplete value will result in an error.'
                  example: null
                  oneOf: [{ type: string, format: date }, { type: 'null' }]
                sharedWithEmployeeIds:
                  description: 'List of employee IDs with whom the goal is shared. Must include the employee ID of the goal owner.'
                  type: array
                  items: { type: integer }
                  example: [1234, 5678]
                alignsWithOptionId:
                  description: 'ID of the option this goal aligns with'
                  oneOf: [{ type: integer }, { type: 'null' }]
                milestones:
                  description: 'Optional. Provide a non-empty array of milestone objects to create a milestone-based goal. Omit this field (or send `null`) to create a simple goal.'
                  type: array
                  items: { properties: { title: { description: 'The title of the milestone', type: string, example: 'Surprise, it is a milestone' } }, type: object }
                  example: [{ title: 'Surprise, it is a milestone' }, { title: 'Now there are two of them!' }]
              type: object
