    Project-CreateTimeTrackingProject-V1:
      description: 'Request body for creating a time tracking project.'
      required:
        - name
      properties:
        name:
          type: string
          maxLength: 50
          minLength: 1
          example: 'Project A'
        billable:
          type: boolean
          default: false
          example: true
        includeInPayroll:
