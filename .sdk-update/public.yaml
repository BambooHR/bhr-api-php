  '/api/v2/datasets/{datasetName}/data':
    post:
      tags:
        - Datasets
        - 'Public API'
      summary: 'Get Data from Dataset (v2)'
      description: "Queries the named dataset and returns the matching rows. The response is a JSON object with `data` (an array of row objects, each wrapping its values under a `fields` object whose keys match the requested field names), `links` (pagination navigation URLs; `prev` and/or `next`, omitted at boundaries), and `meta` (with `page`, `pageSize`, `totalPages`, `totalItems`).\n\nUse this for tabular reporting, custom field selection across many employees, and OData-style filtering against the full dataset field catalog. For lightweight directory-style employee listings or batch lookups by ID, use List Employees (`list-employees`) instead. For the full set of fields on a single employee, use Get Employee (`get-employee`) instead.\n\nDiscover valid `datasetName` values via List Datasets (v1.2) (`list-datasets-v1-2`). Discover valid field names for a dataset via Get Fields from Dataset (v1.2) (`get-fields-from-dataset-v1-2`); the field set is dataset-specific.\n\nField-name vocabulary differs from the dedicated employee endpoints. The `employee` dataset uses fully qualified names such as `jobInformationJobTitle`, `jobInformationDepartment`, `jobInformationReportsTo`, and `employmentStatus`, where List Employees / Get Employee use shorter names like `jobTitleName`, `department`, `reportsTo`, and `status`. Always source field names from Get Fields from Dataset (v1.2) — names from the employee endpoints will not necessarily resolve here.\n\nFilter expressions use OData-style syntax with comparison operators `eq`, `ne`, `lt`, `le`, `gt`, `ge`, the list-membership operator `in (...)`, and logical operators `and` / `or`. The parser does not support `not in`; use `ne` for the inverse of `eq`, and on options-type fields `ne` already applies set-membership negation under the hood. A single filter expression may use `and` or `or`, but not both; mixed logical expressions return `422` with code `INVALID_FILTER`. Operator support varies by field type: `eq` / `ne` work on text, numeric, date, and options-type (single-select enum) fields like `status`, `employmentStatus`, and `jobInformationDepartment`; ordering operators `lt`, `le`, `gt`, `ge` are supported on numeric and date fields. The list operator `in` is the natural fit on options-type fields (e.g. `status in ('Active','Inactive')`), and is also accepted on text, numeric, and date fields when used with a single value (e.g. `firstName in ('Ashley')`, equivalent to `firstName eq 'Ashley'`); multi-value `in` on non-options fields returns `422`. To check a field's type, see the `type` value returned by Get Fields from Dataset (v1.2). Filter fields do not need to appear in the `fields` array; rows are filtered server-side. String literals in filter expressions are wrapped in single quotes, e.g. `firstName eq 'Ashley'` or `status in ('Active','Inactive')`.\n\n`orderBy` is a comma-separated list of `<field> <asc|desc>` rules. Every field used in `orderBy` must also appear in the `fields` array; omitting it returns a `400` with code `UE-1001`. `orderBy` is optional; with no `orderBy` the row order is unspecified.\n\nField-level access is enforced server-side based on the authenticated caller's permissions and OAuth scopes. Callers without permission to a requested field receive an error from the semantic layer rather than silent omission of the field from rows; callers without dataset-level access receive `403`. There is no per-row redaction within the response — a row that includes the caller in its access scope returns all requested fields, and a dataset the caller cannot see at all returns `404` (\"not accessible\" rather than disclosing existence).\n\nPagination: `page` defaults to `1` and `pageSize` defaults to `100` (maximum `1000`). `meta.totalItems` is the count of rows matching the query across all pages, `meta.totalPages` is `ceil(totalItems / pageSize)`, and `data` contains at most `pageSize` rows for the requested page. `links.next` is present when more pages exist; `links.prev` is present when not on the first page. Errors follow RFC 7807 (`application/problem+json`).\n\nNote: Compared to Get Data from Dataset (v1) (`get-data-from-dataset-v1`), this version uses `filter` and `orderBy` request fields instead of the legacy `filters` and `sortBy` structures, moves pagination inputs to body fields (`page`, `pageSize`) instead of query parameters, returns pagination in `links` / `meta` objects instead of a legacy `pagination` object, and returns RFC 7807 compliant error responses with an `X-Request-ID` correlation header."
      operationId: get-data-from-dataset-v2
      parameters:
        -
          name: datasetName
          in: path
          description: 'Machine-readable name of the dataset to query. Discover valid values via List Datasets (v1.2) (`list-datasets-v1-2`); examples include `employee`, `benefit`, and `applicants`. Unknown or inaccessible names return `404`.'
          required: true
          schema:
            type: string
          example: employee
      requestBody:
        description: 'Request parameters for dataset data retrieval'
        required: true
        content:
          application/json:
            schema:
              required:
                - fields
              properties:
                fields:
                  description: "Field names to return for each row. Names are dataset-specific; discover valid names via Get Fields from Dataset (v1.2) (`get-fields-from-dataset-v1-2`). The field-name vocabulary differs from the dedicated employee endpoints (e.g., the `employee` dataset uses `jobInformationReportsTo` / `jobInformationDepartment` / `employmentStatus` rather than List Employees' `reportsTo` / `department` / `status`)."
                  type: array
                  items: { type: string }
                  example: [firstName, lastName, employmentStatus]
                filter:
                  description: "OData-style filter expression. Comparison operators: `eq`, `ne`, `lt`, `le`, `gt`, `ge`. List-membership operator: `in (...)` (the parser does not support `not in`; use `ne` for the inverse). Logical operators: `and`, `or`. A single filter expression may use `and` or `or`, but not both; mixed logical expressions return `422` with code `INVALID_FILTER`. Operator support varies by field type. `eq` / `ne` work on text, numeric, date, and options-type (single-select enum) fields. Ordering operators (`lt`, `le`, `gt`, `ge`) work on numeric and date fields. `in (...)` is the natural fit on options-type fields like `status`, `employmentStatus`, and `jobInformationDepartment`, and is also accepted on text, numeric, and date fields when the list has a single value (equivalent to `eq`). Multi-value `in` on non-options fields returns `422`. To check a field's type, see the `type` value returned by Get Fields from Dataset (v1.2). String literals are wrapped in single quotes. Filter fields do not need to appear in `fields`."
                  example: "firstName eq 'Ashley' or firstName eq 'Charlotte'"
                  oneOf: [{ type: string }, { type: 'null' }]
                orderBy:
                  description: 'Comma-separated sort rules; each rule is a field name followed by `asc` or `desc`. Every field referenced in `orderBy` must also appear in `fields` — otherwise the request is rejected with `400` and code `UE-1001`. Omit to leave row order unspecified.'
                  example: 'lastName asc, firstName desc'
                  oneOf: [{ type: string }, { type: 'null' }]
                page:
                  description: 'Page number to retrieve (1-indexed). Defaults to 1.'
                  type: integer
                  default: 1
                  minimum: 1
                  example: 1
                pageSize:
                  description: 'Number of records per page. Defaults to 100. Maximum is 1000.'
                  type: integer
                  default: 100
                  maximum: 1000
                  minimum: 1
                  example: 25
              type: object
      responses:
        '200':
          description: 'Object containing `data` (array of record objects each wrapping requested values under a `fields` object), `links` (pagination URLs; `prev` and/or `next`, omitted at boundaries), and `meta` (`page`, `pageSize`, `totalPages`, `totalItems`).'
          headers:
            X-Request-ID:
              description: 'Correlation ID for request tracing. Echoes the client-provided value or a generated identifier.'
              schema:
                type: string
          content:
            application/json:
              schema:
                title: DatasetDataResponseV2
                properties:
                  data: { description: 'Array of record objects. Each object contains a `fields` object whose keys are the requested field names. Values may be strings, numbers, booleans, arrays/objects, or null depending on the dataset field and value.', type: array, items: { properties: { fields: { type: object, additionalProperties: { anyOf: [{ type: string }, { type: number }, { type: boolean }, { type: array, items: {  } }, { type: object }, { type: 'null' }] } } }, type: object } }
                  links: { description: 'Pagination navigation links. Contains `next` and/or `prev` URLs when applicable.', properties: { next: { oneOf: [{ type: string }, { type: 'null' }] }, prev: { oneOf: [{ type: string }, { type: 'null' }] } }, type: object }
                  meta: { description: 'Pagination metadata.', properties: { page: { type: integer }, pageSize: { type: integer }, totalPages: { type: integer }, totalItems: { type: integer } }, type: object }
                type: object
        '400':
          description: 'Missing or invalid parameters.'
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsResponse'
        '401':
          description: Unauthorized.
        '403':
          description: 'Insufficient permissions to access the requested dataset.'
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsResponse'
        '404':
          description: 'The specified dataset does not exist or is not accessible.'
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsResponse'
        '413':
          description: 'The request produced too much data.'
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsResponse'
        '422':
          description: 'Validation failed, such as an invalid filter expression or pagination value.'
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsResponse'
        '500':
          description: 'Internal server error.'
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsResponse'
      security:
        -
          basic: []
        -
          oauth:
            - report
      x-mcp-annotations:
        readOnlyHint: true
        destructiveHint: false
        openWorldHint: false
  /api/v1/applicant_tracking/applications:
    get:
      tags:
        - 'Public API'
        - 'Applicant Tracking'
      summary: 'Get Job Applications'
      description: 'Get a list of applications. The owner of the API key used must have access to ATS settings. Combine as many different optional parameter filters as you like.'
      operationId: get-applications
      parameters:
        -
          name: page
          in: query
          description: 'The page number'
          schema:
            type: integer
        -
          name: jobId
          in: query
          description: 'A Job Id to limit results to'
          schema:
            type: integer
        -
          name: applicationStatusId
          in: query
          description: 'One or more application status IDs to filter by, comma-separated (e.g. `1,2,3`).'
          schema:
            type: string
        -
          name: applicationStatus
          in: query
          description: 'One or more application status group codes to filter by, comma-separated (e.g. `NEW,ACTIVE`). Allowed values: `ALL`, `ALL_ACTIVE`, `NEW`, `ACTIVE`, `INACTIVE`, `HIRED`.'
          schema:
            type: string
        -
          name: jobStatusGroups
          in: query
          description: 'One or more position status groups to filter by, comma-separated (e.g. `Draft,Open`). Allowed values: `ALL`, `DRAFT_AND_OPEN`, `Open`, `Filled`, `Draft`, `Deleted`, `On Hold`, `Canceled`.'
          schema:
            type: string
        -
          name: searchString
          in: query
          description: 'A general search criteria by which to find applications.'
          schema:
            type: string
        -
          name: sortBy
          in: query
          description: 'A specific field to sort the results by.'
          schema:
            type: string
            enum:
              - first_name
              - job_title
              - rating
              - phone
              - status
              - last_updated
              - created_date
        -
          name: sortOrder
          in: query
          description: 'Order by which to sort results.'
          schema:
            type: string
            enum:
              - ASC
              - DESC
        -
          name: newSince
          in: query
          description: 'Only return applications submitted after this UTC timestamp. Format: `Y-m-d H:i:s` (e.g. `2024-01-01 13:00:00`).'
          schema:
            type: string
            example: '2024-01-01 13:00:00'
      responses:
        '200':
          description: 'Success. Returns a paginated list of applications.'
          content:
            application/json:
              schema:
                title: ApplicationsList
                properties:
                  paginationComplete: { description: 'Indicates whether there are more pages of results available', type: boolean }
                  nextPageUrl: { description: 'URL to fetch the next page of results, or null if there are no more results', oneOf: [{ type: string }, { type: 'null' }] }
                  applications: { description: 'List of application objects', type: array, items: { properties: { id: { description: 'Application ID', type: integer }, appliedDate: { description: 'ISO 8601 datetime when the application was submitted', type: string, format: date-time }, status: { description: 'Current status of the application', properties: { id: { description: 'Status ID', type: integer }, label: { description: 'Status name', type: string } }, type: object }, rating: { description: 'Candidate rating (1-5) or null if not rated', oneOf: [{ type: integer }, { type: 'null' }] }, applicant: { description: 'Information about the applicant', properties: { id: { description: 'Applicant ID', type: integer }, firstName: { description: "Applicant's first name", type: string }, lastName: { description: "Applicant's last name", type: string }, avatar: { description: "URL to applicant's avatar image, or null", oneOf: [{ type: string }, { type: 'null' }] }, email: { description: "Applicant's email address", type: string }, source: { description: 'Source of the application', type: string } }, type: object }, job: { description: 'Information about the job position', properties: { id: { description: 'Job position ID', type: integer }, title: { description: 'Job position title', properties: { id: { description: 'Title ID, or null if not set', oneOf: [{ type: integer }, { type: 'null' }] }, label: { description: 'Title text', type: string } }, type: object } }, type: object } }, type: object } }
                type: object
        '400':
          description: 'Bad request parameters.'
          content:
            application/json: {  }
        '401':
          description: 'Unauthorized. Invalid API credentials.'
          content:
            application/json: {  }
        '403':
          description: 'Insufficient user permissions or API access is not turned on.'
          content:
            application/json: {  }
      security:
        -
          basic: []
        -
          oauth:
            - 'hiring:applications'
