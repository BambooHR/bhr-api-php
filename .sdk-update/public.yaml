      tags:
        - Scheduling
        - 'Public API'
      summary: 'Delete Shift'
      description: 'Deletes a shift by its UUID or composite recurrence ID. Use `recurrenceEditOption` to control the scope to delete one or many consecutive recurring shifts'
      operationId: scheduling-delete-shift
      parameters:
        -
          name: id
          in: path
          description: 'The shift UUID, or the projected shift composite ID.'
          required: true
          schema:
            type: string
            format: uuid
        -
          name: recurrenceEditOption
          in: query
          description: "How should the shift be deleted? Choose 'instance' for deleting a single target shift, \n\t\t'future' for deleting the target shift and all following shifts that are in the same recurrence, \n\t\t'all' for deleting all shifts starting from now that are in the same recurrence as the target shift."
          required: false
          schema:
            type: string
            default: instance
            enum:
              - instance
              - future
              - all
            example: future
