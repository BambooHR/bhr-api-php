        employeeIds:
          description: 'What employees are assigned to this schedule'
          type: array
          items:
            type: integer
          example:
            - 10
            - 20
        createdAt:
          description: 'UTC timestamp when the schedule was created'
          type: string
          format: date-time
          readOnly: true
          example: '2025-01-01T06:00:00Z'
        updatedAt:
          description: 'UTC timestamp when the schedule was last updated'
