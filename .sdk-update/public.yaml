            application/json:
              schema:
                $ref: '#/components/schemas/GetEmployeeResponse'
            application/xml:
              schema:
                $ref: '#/components/schemas/GetEmployeeResponse'
        '400':
          description: 'The `fields` parameter contained more than 400 entries.'
        '401':
          description: Unauthorized.
        '403':
          description: 'The authenticated user does not have permission to view this employee.'
        '404':
          description: 'No employee was found for the supplied ID.'
      security:
        -
          basic: []
        -
          oauth:
            - employee
        -
          oauth:
            - 'employee:assets'
        -
          oauth:
            - 'employee:contact'
        -
          oauth:
            - 'employee:compensation'
        -
