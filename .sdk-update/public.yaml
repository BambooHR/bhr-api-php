  /api/v1/employees:
    get:
      tags:
        - Employees
        - 'Public API'
      summary: 'List Employees'
      description: "Returns a cursor-paginated collection of employees for the authenticated caller's company. The response is a JSON object with `data` (an array of employee records), `meta.total` (count of all employees matching the filter, not just the current page), `meta.page` (cursor pagination state), and `_links` (`self`, plus `next` / `prev` when more pages exist). Each employee record always includes the default identity and job fields, plus any additional fields requested via `fields`. `employeeId` is returned as a string. Field values the caller cannot read are returned as `null`, and the names of those suppressed fields are listed on the record in `_restrictedFields`; if the caller cannot read a field used in `filter` or `sort`, the affected employee is dropped from the result set entirely to avoid leaking presence. IDs for `filter[ids]` come from prior responses of this endpoint. Use this for lightweight directory-style listings and batch lookups by ID. For a single employee with the full set of fields, use Get Employee (`get-employee`) instead. For complex filtering (date ranges, multi-field predicates, OR/IN logic), arbitrary sorting, or tabular reports across many fields, use Get Data from Dataset (v2) (`get-data-from-dataset-v2`) instead."
      operationId: list-employees
      parameters:
        -
          name: filter
          in: query
          description: 'Filters used to match employees. Encode filter properties using deepObject style (`filter[firstName]=Ava`). Multiple filter fields are combined with AND. `filter[ids]` accepts either repeated keys (`filter[ids][]=123&filter[ids][]=124`) or a single comma-separated string (`filter[ids]=123,124`); both forms are supported.'
          required: false
          style: deepObject
          explode: true
          schema:
            $ref: '#/components/schemas/GetEmployeesFilterRequestObject'
        -
          name: sort
          in: query
          description: 'Comma-separated list of sortable fields. Prefix a field with `-` for descending order. Allowed fields: `employeeId`, `firstName`, `lastName`, `preferredName`, `jobTitleName`, `status`. Nulls sort first in ascending order and last in descending order. An invalid sort field returns a `BadRequest` error.'
          required: false
          schema:
            type: string
          example: '-lastName,firstName'
        -
          name: fields
          in: query
          description: "Additional fields to include in each employee record beyond the default set. The canonical form is a comma-separated list (`fields=workEmail,mobilePhone`); for backward compatibility the endpoint also accepts the bracket-array form (`fields[]=workEmail&fields[]=mobilePhone`). Note: plain repeated keys without brackets (`fields=workEmail&fields=mobilePhone`) are unreliable — most HTTP stacks keep only the last value, silently dropping earlier ones; use the comma-separated form instead. Unrecognized field names are silently ignored. Returned values are subject to permission checks — fields the caller cannot read are returned as `null` and their names are listed in the record's `_restrictedFields` array."
          required: false
          style: form
          explode: false
          schema:
            type: array
            items:
              $ref: '#/components/schemas/EmployeeOptionalField'
          example: 'workEmail,mobilePhone'
        -
          name: page
          in: query
          description: "Cursor-based pagination parameters. `page[limit]` controls page size (default 250, maximum 2500). `page[after]` and `page[before]` accept opaque cursors returned in the previous response's `meta.page.nextCursor` / `prevCursor`; do not specify both at once. The response's `_links.next` / `_links.prev` are pre-built URLs that already encode the correct cursor for the next or previous page."
          required: false
          style: deepObject
          explode: true
          schema:
            $ref: '#/components/schemas/EmployeeCursorPaginationQueryObject'
      responses:
        '200':
          description: 'Paginated list of employees.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetEmployeesResponseObject'
              examples:
                basic:
                  summary: 'Basic paginated result'
                  value: { data: [{ employeeId: '123', firstName: Ava, lastName: Nguyen, preferredName: Ava, photoUrl: 'https://cdn.example.com/p/123.jpg', jobTitleName: 'Engineering Manager', status: Active, _restrictedFields: [] }, { employeeId: '124', firstName: Sam, lastName: Park, preferredName: Sam, photoUrl: null, jobTitleName: 'Product Designer', status: Active, _restrictedFields: [photoUrl] }], meta: { total: 2456, page: { limit: 100, nextCursor: eyJuZXh0RW1wbG95ZWUiOjEyNX0=, prevCursor: null } }, _links: { self: { href: 'https://example.bamboohr.com/api/v1/employees?page%5Blimit%5D=100' }, next: { href: 'https://example.bamboohr.com/api/v1/employees?page%5Blimit%5D=100&page%5Bafter%5D=eyJuZXh0RW1wbG95ZWUiOjEyNX0%3D' } } }
                batchByIds:
                  summary: 'Batch fetch by a list of employee IDs'
                  value: { data: [{ employeeId: '200', firstName: Lena, lastName: Smith, preferredName: Lena, photoUrl: null, jobTitleName: 'QA Analyst', status: Active, _restrictedFields: [] }, { employeeId: '207', firstName: Marco, lastName: Lee, preferredName: null, photoUrl: null, jobTitleName: 'Support Engineer', status: Inactive, _restrictedFields: [photoUrl] }], meta: { total: 2, page: { limit: 250, nextCursor: null, prevCursor: null } }, _links: { self: { href: 'https://example.bamboohr.com/api/v1/employees?filter%5Bids%5D=200%2C207' } } }
        '400':
          description: 'Invalid request parameters. The `error.code` is `BadRequest` for filter, sort, or field validation failures (for example an unknown sort field, or `filter[status]` outside `active` / `inactive`) and `BadPage` when the `page` cursor is malformed, the wrong cursor direction is supplied, or the boundary employee changed between calls (for example, was deleted or no longer matches the filter).'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee-StringCodeErrorResponse-V1'
        '401':
          description: Unauthorized.
        '429':
          description: 'Too many requests.'
        '500':
          description: 'Internal server error.'
      security:
        -
          basic: []
        -
          oauth:
            - employee
        -
          oauth:
            - 'employee:name'
        -
          oauth:
            - 'employee:job'
        -
          oauth:
            - employee_directory
        -
          oauth:
            - 'sensitive_employee:protected_info'
    post:
      tags:
        - Employees
        - 'Public API'
      summary: 'Create Employee'
      description: "Create a new employee. At minimum, provide a first name and last name in a JSON object or XML document. The request body schema lists commonly used fields, but any valid writable employee field name may be included as a key. To discover available field names, call the List Fields endpoint (operationId: list-fields, GET /api/v1/meta/fields).\n\nThis endpoint does not upload, set, or remove the employee profile photo. Photo-related keys (e.g. `photo`, `photoUrl`) included in the body are silently ignored: the request still creates the employee and returns 201, but no photo is attached. After creating the employee, use the Upload Employee Photo endpoint (operationId: upload-employee-photo, POST /api/v1/employees/{employeeId}/photo) to set the photo.\n\nTrax Payroll note: Employees added to a pay schedule synced with Trax Payroll must include the required payroll-related employee fields: employeeNumber (unless the company has automatic employee numbers enabled), firstName, lastName, dateOfBirth, ssn or ein, gender, maritalStatus, hireDate, address1, city, state, zipcode, country, employmentHistoryStatus, exempt, payType, payRate, payPer, overtimeRate, and location."
