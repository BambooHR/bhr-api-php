          description: 'Insufficient permissions to access this dataset.'
        '500':
          description: 'An unexpected internal error occurred while retrieving data.'
      deprecated: true
      security:
        -
          basic: []
        -
          oauth:
            - report
  '/api/v1/custom-reports/{reportId}':
