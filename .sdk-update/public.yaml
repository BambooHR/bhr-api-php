  '/api/v1_1/performance/employees/{employeeId}/goals/{goalId}':
    put:
      tags:
        - Goals
        - 'Public API'
      summary: 'Update Goal (v1.1)'
      description: 'Update a goal''s top-level fields and optionally add or delete milestones. Milestone handling is not a full replace or upsert: objects passed in `milestones` are always added as new milestones, even if their titles match existing milestones. To keep existing milestones unchanged while editing title, description, due date, sharing, or alignment, omit the `milestones` field. To remove milestones, pass their IDs in `deletedMilestoneIds`. There is no field for editing an existing milestone title in place. Note: Compared to "Update Goal (v1)", this version adds milestone updates.'
      operationId: update-goal-v1.1
      parameters:
        -
          name: employeeId
          in: path
          description: 'employeeId is the employee ID with whom the goal is associated.'
          required: true
          schema:
            type: integer
        -
          name: goalId
          in: path
          description: 'goalId is the goal ID for the specified employee.'
          required: true
          schema:
            type: integer
      requestBody:
        description: 'Required fields: `title`, `sharedWithEmployeeIds`, and `dueDate`. Omit optional fields that should remain unchanged. In particular, omit `milestones` unless adding new milestones; included milestones are appended, not reconciled or replaced.'
        required: true
        content:
          application/json:
            schema:
              required:
                - title
                - dueDate
                - sharedWithEmployeeIds
              properties:
                title:
                  description: 'The title of the goal'
                  type: string
                  example: 'Edited Goal With Milestones'
                description:
                  description: 'A detailed description of the goal'
                  type: string
                  example: 'Lets go!'
                dueDate:
                  description: 'The due date for the goal in YYYY-MM-DD format'
                  type: string
                  format: date
                  example: '2024-03-17'
                percentComplete:
                  description: 'The percentage of completion for the goal (0-100). Defaults to 0 if omitted. Ignored when milestonesEnabled is true.'
                  type: integer
                  maximum: 100
                  minimum: 0
                completionDate:
                  description: 'The date when the goal was completed in YYYY-MM-DD format. Only valid when percentComplete is 100; providing this field with any other percentComplete value will result in an error. Ignored when milestonesEnabled is true.'
                  oneOf: [{ type: string, format: date }, { type: 'null' }]
                sharedWithEmployeeIds:
                  description: 'List of employee IDs with whom the goal is shared. Must include the employee ID of the goal owner.'
                  type: array
                  items: { type: integer }
                  example: [1234, 5678]
                alignsWithOptionId:
                  description: 'ID of the option this goal aligns with'
                  oneOf: [{ type: integer }, { type: 'null' }]
                milestonesEnabled:
                  description: 'Flag indicating whether milestones are enabled for this goal'
                  type: boolean
                  example: true
                deletedMilestoneIds:
                  description: 'List of milestone IDs to be deleted from the goal'
                  type: array
                  items: { type: integer }
                  example: [490]
                milestones:
                  description: 'Optional. New milestones to add to the goal. Each object in this array creates a new milestone — even if its title matches an existing milestone. Do not include existing milestones here unless you intentionally want duplicates. To remove milestones, use `deletedMilestoneIds`.'
                  type: array
                  items: { properties: { title: { description: 'The title of the milestone', type: string } }, type: object }
              type: object
      responses:
        '200':
          description: 'A successful response indicates that all the requested changes were made. The content of the response will be the goal response object for the specified goalId.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransformedApiEmployeeGoalDetails'
        '400':
          description: 'The request is invalid. Possible causes: sharedWithEmployeeIds is not an array or missing the goal owner, percentComplete is out of range (0–100), the goal has milestones and percentComplete cannot be manually updated, or the goal is a cascading goal (not supported by this endpoint).'
          content:
            application/json: {  }
        '403':
          description: 'Goal is not editable or insufficient permissions.'
          content:
            application/json: {  }
        '404':
          description: 'The goal specified by the given goalId was not found.'
          content:
            application/json: {  }
        '500':
          description: 'Something went wrong editing your goal.'
          content:
            application/json: {  }
      security:
        -
          basic: []
        -
          oauth:
            - goal.write
