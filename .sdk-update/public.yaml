  '/api/v1/employees/{employeeId}/photo':
    post:
      tags:
        - Photos
        - 'Public API'
      summary: 'Upload Employee Photo'
      description: "Uploads a new photo for an employee. Accepts either a `multipart/form-data` POST with a `file` field carrying raw binary image bytes (typical browser/SDK usage), or an `application/json` POST with a `fileBase64` property carrying the base64-encoded image bytes (typical MCP/LLM-connector usage). The server selects the path based on the request `Content-Type`. Supported formats: JPEG, PNG, BMP, GIF. Other formats (HEIC, SVG, AVIF, WebP) are rejected with 415; TIFF is accepted by the format gate but some variants may fail downstream. The image must be square (width and height must match within one pixel) and at least 150×150 pixels. Maximum file size is 20MB (applies to the decoded bytes for the JSON variant). The photo replaces the employee's current photo for all size variants. Employees may upload their own photo if the company has self-photo uploads enabled."
      operationId: upload-employee-photo
      parameters:
        -
          name: employeeId
          in: path
          description: 'The ID of the employee whose photo is being uploaded.'
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              required:
                - file
              properties:
                file:
                  description: "The image file to upload as the employee's photo. Supported formats: JPEG, PNG, BMP, GIF (HEIC, SVG, AVIF, and WebP are rejected with 415; TIFF is accepted by the format gate but some variants may fail downstream). Must be square (width and height within 1 pixel), at least 150×150 pixels, and no larger than 20MB."
                  type: string
                  format: binary
              type: object
          application/json:
            schema:
              required:
                - fileBase64
              properties:
                fileBase64:
                  description: 'Base64-encoded image bytes. Same format/size/dimension rules as the multipart `file` field: JPEG, PNG, BMP, or GIF (HEIC, SVG, AVIF, and WebP are rejected with 415; TIFF is accepted by the format gate but some variants may fail downstream); square within 1 pixel; at least 150×150 pixels; decoded payload no larger than 20MB. Whitespace inside the base64 string is tolerated and stripped before decoding.'
                  type: string
                  format: byte
              type: object
      responses:
        '201':
          description: 'The photo was uploaded and processed successfully. No response body is returned.'
        '400':
          description: 'The request is invalid: no file provided, zero-byte file, or the maximum number of photo uploads (32767) has been exceeded.'
        '402':
          description: 'The photo could not be processed: the image crop failed, or the file contents could not be read.'
        '403':
          description: 'The authenticated user does not have permission to upload photos for this employee.'
        '404':
          description: 'The employee does not exist.'
        '413':
          description: 'The uploaded file exceeds the 20MB size limit.'
        '415':
          description: 'The image does not meet requirements: not square (width and height differ by more than one pixel), smaller than 150×150 pixels, or the file could not be read as a supported image format.'
      security:
        -
          basic: []
        -
          oauth:
            - 'employee:photo.write'
  /api/v1/time_off/whos_out:
    get:
      tags:
        - 'Time Off'
        - 'Public API'
      summary: 'List Who’s Out'
      description: 'Returns a date-sorted list of employees who are out and company holidays for the specified period. Defaults to today through 14 days out when dates are omitted. Results include both `timeOff` entries (employee requests) and `holiday` entries, each identified by `type`. An empty array may mean no one is out, or that no holidays have been configured in the BambooHR company calendar — holidays must be set up there before they appear here. The `filter: off` parameter applies only to employee time-off entries; holidays are independently filtered per-employee based on holiday visibility settings, and that filter is not disabled by `filter: off`.'
      operationId: list-whos-out
      parameters:
        -
          $ref: '#/components/parameters/AcceptHeaderParameter'
        -
          name: start
          in: query
          description: 'Start date in YYYY-MM-DD format. Defaults to today.'
          schema:
            type: string
            format: date
        -
          name: end
          in: query
          description: 'End date in YYYY-MM-DD format. Defaults to 14 days after the start date.'
          schema:
            type: string
            format: date
        -
          name: filter
          in: query
          description: "Controls the Who's Out calendar filter. By default (parameter omitted), results are limited to the set of employees defined by the authenticated user's saved Who's Out calendar filter (the same filter applied to their in-app Who's Out view). A user with no filter configured sees all employees; a user with a saved filter (e.g. by department, location, division) sees only the configured subset. Set to `off` to ignore the saved filter and return employee time-off entries for everyone — useful for admins or integrations that need the complete company-wide view, or to diagnose whether incomplete results are caused by the saved filter. Note: this parameter applies to employee `timeOff` entries only. `holiday` entries are filtered separately on a per-employee basis (holidays can be configured as visible to specific employees) and that filter is not affected by `filter: off`."
          schema:
            type: string
            enum:
              - 'off'
      responses:
        '200':
          description: 'A date-sorted list of employees who are out and company holidays.'
          content:
            application/json:
              schema:
                title: WhosOutResponse
                type: array
                items:
                  title: WhosOutEntry
                  properties: { id: { description: 'The time off request ID or holiday ID.', type: integer }, type: { description: "Whether this entry is a time off request or a company holiday. Entries have two shapes depending on `type`: `timeOff` entries include `employeeId` and `name` (the employee's name); `holiday` entries include only `name` (the holiday name) and omit `employeeId`. Always check `type` before accessing `employeeId`.", type: string, enum: [timeOff, holiday] }, employeeId: { description: 'The employee ID. Only present for `timeOff` entries; omitted for `holiday` entries.', type: integer }, name: { description: "For `timeOff` entries, the employee's name. For `holiday` entries, the holiday's name.", type: string }, start: { description: 'Start date in YYYY-MM-DD format.', type: string, format: date }, end: { description: 'End date in YYYY-MM-DD format.', type: string, format: date } }
                  type: object
            application/xml: {  }
        '401':
          description: 'Unauthorized. Invalid API credentials.'
        '403':
          description: "The Who's Out feature is disabled for this account."
      security:
        -
          basic: []
        -
          oauth:
            - time_off
components:
  schemas:
    CursorPagedResponseMetadata:
      description: 'Metadata information for employee list responses including total count and pagination details'
      required:
        - total
        - page
      properties:
        total:
          description: 'Total number of employees matching the filter criteria'
          type: integer
        page:
          $ref: '#/components/schemas/CursorPagesResponse'
          description: 'Pagination information for the current response'
      type: object
    CursorPagesResponse:
      description: 'Pagination information for employee list responses including limit and cursor-based navigation'
      required:
        - limit
        - nextCursor
        - prevCursor
      properties:
        limit:
          description: 'Maximum number of items per page'
          oneOf:
            -
              type: integer
            -
              type: 'null'
        nextCursor:
          description: 'Cursor for the next page of results, null if no more pages. This should be used with the after pagination parameter.'
          oneOf:
            -
              type: string
            -
              type: 'null'
        prevCursor:
          description: 'Cursor for the previous page of results, null if on first page. This should be used with the before pagination parameter.'
          oneOf:
            -
              type: string
            -
              type: 'null'
      type: object
    CursorPaginationQueryObject:
      properties:
        before:
          description: 'Cursor pointing to the start of the previous page. Use the `prevCursor` value from the last response to paginate backward.'
          type: string
        after:
          description: 'Cursor pointing to the start of the next page. Use the `nextCursor` value from the last response to paginate forward.'
          type: string
        limit:
          description: 'Maximum number of items to return. This can be at most 100.'
          type: integer
          default: 50
          maximum: 100
          minimum: 1
      type: object
