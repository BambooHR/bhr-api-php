    Project-TimeTrackingProjectCollection-V1:
      description: 'Collection of time tracking projects.'
      type: array
      items:
        $ref: '#/components/schemas/Project-TimeTrackingProject-V1'
    Project-TimeTrackingProject-V1:
      description: 'A time tracking project. Projects are organizational units used to classify hours worked.'
      properties:
        id:
          description: 'The ID of the project.'
          type: integer
          readOnly: true
          example: 1
        name:
          description: 'The name of the project.'
          type: string
          example: 'Project A'
        billable:
          description: 'Whether or not the project is billable.'
          type: boolean
          example: false
        includeInPayroll:
          description: 'Whether hours logged to this project will show in payroll and payroll reports.'
          type: boolean
          example: false
        allEmployeesAssigned:
          description: 'Whether all time & attendance employees are assigned or not.'
          type: boolean
          example: true
        archived:
          description: 'Whether or not the project is archived.'
          type: boolean
          example: false
        hasTasks:
          description: 'Whether time is logged to tasks under the project (true) or directly to the project (false).'
          type: boolean
          example: true
        createdAt:
          description: 'ISO 8601 timestamp when the project was created.'
          readOnly: true
          example: '2025-10-15T16:00:00Z'
          oneOf:
            -
              type: string
              format: date-time
            -
              type: 'null'
        updatedAt:
          description: 'ISO 8601 timestamp when the project was last updated.'
          readOnly: true
          example: '2025-10-15T16:00:00Z'
          oneOf:
            -
              type: string
              format: date-time
            -
              type: 'null'
        deletedAt:
          description: 'ISO 8601 timestamp when the project was deleted.'
          readOnly: true
          example: '2025-10-15T16:00:00Z'
          oneOf:
            -
              type: string
              format: date-time
            -
              type: 'null'
        employeeIds:
          description: 'Array of employeeIds assigned to the project.'
          type: array
          items:
            type: integer
          example:
            - 1
            - 2
            - 3
      type: object
    Project-UpdateTimeTrackingProject-V1:
      description: 'Data contract for partially updating a time tracking project. All fields are optional; only fields present in the request body will be updated.'
      properties:
        name:
          description: 'The name of the project.'
          type: string
          example: 'Project A'
        billable:
          description: 'Whether or not the project is billable.'
          type: boolean
          example: true
        includeInPayroll:
          description: 'Whether hours logged to this project will show in payroll and payroll reports.'
          type: boolean
          example: true
        allEmployeesAssigned:
          description: 'Whether all time & attendance employees are assigned or not.'
          type: boolean
          example: true
        archived:
          description: 'Whether or not the project is archived.'
          type: boolean
          example: false
        employeeIds:
          description: 'Array of employee IDs to assign to the project. Replaces the current assignment list when present; an empty array clears all assignments.'
          type: array
          items:
            type: integer
          example:
            - 1
            - 2
            - 3
        hasTasks:
          description: 'Toggles whether time is logged directly to the project (false) or to specific tasks on the project (true). Setting to true requires the project to already have at least one active task; setting to false leaves existing tasks unchanged.'
          type: boolean
          example: true
      type: object
    Project-TimeTrackingTaskCollection-V1:
      description: 'Collection of time tracking tasks for a project.'
      type: array
      items:
        $ref: '#/components/schemas/Project-TimeTrackingTask-V1'
    Project-CreateTimeTrackingProjectTask-V1:
      description: 'Payload to create a task on a time tracking project.'
      required:
        - name
      properties:
        name:
          description: 'Display name of the task.'
          type: string
          maxLength: 50
          example: 'Client onboarding'
        billable:
          description: 'Whether hours on this task are billable. Defaults to false when omitted.'
          example: true
          oneOf:
            -
              type: boolean
            -
              type: 'null'
      type: object
    Project-TimeTrackingTask-V1:
      description: 'A task within a time tracking project. Tasks are sub-organizational units used to further classify hours worked.'
      properties:
        id:
          description: 'The ID of the task.'
          type: integer
          readOnly: true
          example: 1
        name:
          description: 'The name of the task.'
          type: string
          example: 'Task A'
        projectId:
          description: 'The ID of the project this task belongs to.'
          type: integer
          example: 1
        billable:
          description: 'Whether the task is billable.'
          type: boolean
          example: false
        createdAt:
          description: 'ISO 8601 timestamp when the task was created.'
          readOnly: true
          example: '2025-10-15T16:00:00Z'
          oneOf:
            -
              type: string
              format: date-time
            -
              type: 'null'
        updatedAt:
          description: 'ISO 8601 timestamp when the task was last updated.'
          readOnly: true
          example: '2025-10-15T16:00:00Z'
          oneOf:
            -
              type: string
              format: date-time
            -
              type: 'null'
        deletedAt:
          description: 'ISO 8601 timestamp when the task was deleted.'
          readOnly: true
          example: '2025-10-15T16:00:00Z'
          oneOf:
            -
              type: string
              format: date-time
            -
              type: 'null'
      type: object
    Project-UpdateTimeTrackingProjectTask-V1:
      description: 'Payload to partially update a task on a time tracking project. All fields are optional; at least one field must be provided.'
      minProperties: 1
      properties:
        name:
          description: 'Display name of the task.'
          type: string
          maxLength: 50
          example: 'Client onboarding'
