openapi: 3.1.0
info:
  title: 'BambooHR API'
  description: 'BambooHR API documentation. https://www.bamboohr.com/api/documentation/'
  version: '1.0'
servers:
  -
    url: 'https://{companyDomain}.bamboohr.com'
    variables:
      companyDomain:
        default: companySubDomain
        description: 'Company domain'
paths:
  /api/v1/alert-configurations:
    get:
      tags:
        - 'Alert Configurations'
        - 'Public API'
      summary: 'List alert configurations'
      description: 'Returns all company alert configurations for the authenticated company.'
      operationId: 6d0a073cbf3e97fe0409de42c68fe779
      responses:
        '200':
          description: 'List of alert configurations'
          content:
            application/json:
              schema:
                title: AlertConfigurationListResponse
                type: array
                items:
                  $ref: '#/components/schemas/CompanyAlertDataObject'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsResponse'
        '500':
          description: 'Internal server error'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsResponse'
      security:
        -
          oauth:
            - alerts
    post:
      tags:
        - 'Alert Configurations'
        - 'Public API'
      summary: 'Create an alert configuration'
      description: 'Creates a new company alert configuration.'
      operationId: a05e93bc2eb9c39a40fbd71e6e07f3c6
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyAlertDataObject'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyAlertDataObject'
        '400':
          description: 'Bad request'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsResponse'
        '500':
          description: 'Internal server error'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsResponse'
      security:
        -
          oauth:
            - alerts.write
  '/api/v1/alert-configurations/{id}':
    get:
      tags:
        - 'Alert Configurations'
        - 'Public API'
      summary: 'Get an alert configuration'
      description: 'Returns a single company alert configuration by ID.'
      operationId: 14e66bfb5f075043221ce1e843c97493
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 'Alert configuration'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyAlertDataObject'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsResponse'
        '404':
          description: 'Not found'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsResponse'
        '500':
          description: 'Internal server error'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsResponse'
      security:
        -
          oauth:
            - alerts
    put:
      tags:
        - 'Alert Configurations'
        - 'Public API'
      summary: 'Update an alert configuration'
      description: 'Updates an existing company alert configuration.'
      operationId: eb42aa2fa339ba5c08b147fc13c6a79e
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyAlertDataObject'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyAlertDataObject'
        '400':
          description: 'Bad request'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsResponse'
        '500':
          description: 'Internal server error'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsResponse'
      security:
        -
          oauth:
            - alerts.write
  /api/v1/alerts:
    get:
      tags:
        - Alert
        - 'Public API'
      summary: 'List alert templates'
      description: 'Returns all available alert templates with their IDs, names, and group names. Use the returned IDs when creating or updating company alert configurations.'
      operationId: 0f0dcb585e5883175b6557c16cf6755a
      responses:
        '200':
          description: 'List of alert templates'
          content:
            application/json:
              schema:
                title: AlertTemplateListResponse
                properties:
                  alerts: { type: array, items: { properties: { id: { description: 'Alert template ID (bambooAlertId)', type: integer }, name: { description: 'Display name of the alert', type: string }, groupName: { description: 'Category group the alert belongs to', type: string } }, type: object } }
                type: object
        '403':
          description: Forbidden
        '500':
          description: 'Internal server error'
      security:
        -
          oauth:
            - alerts
  /api/v1/compensation/equity/settings:
    get:
      tags:
        - Compensation
        - 'Public API'
      summary: 'Get company equity settings'
      description: 'Retrieves company-level equity settings including calculation type, valuation, shares, pricing, and vesting-related configuration.'
      operationId: db49fb29f9f04d59afad7c01ce860418
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                title: CompensationEquitySettingsResponse
                properties:
                  calculationType: { type: string }
                  companyValuation: { oneOf: [{ type: number }, { type: 'null' }] }
                  outstandingShares: { oneOf: [{ type: integer }, { type: 'null' }] }
                  pricePerShare: { oneOf: [{ type: number }, { type: 'null' }] }
                  currencyCode: { type: string }
                  sliderMin: { oneOf: [{ type: integer }, { type: 'null' }] }
                  sliderMax: { oneOf: [{ type: integer }, { type: 'null' }] }
                  vestingConditions: { oneOf: [{ type: string }, { type: 'null' }] }
                  disclaimers: { oneOf: [{ type: string }, { type: 'null' }] }
                type: object
                additionalProperties: true
        '403':
          description: Forbidden
        '500':
          description: 'Internal server error'
      security:
        -
          oauth:
            - equity
    put:
      tags:
        - Compensation
        - 'Public API'
      summary: 'Update company equity settings'
      description: 'Updates company-level equity settings including calculation type, valuation, shares, pricing, and vesting-related configuration.'
      operationId: c5880b509783cd9d7fce9ddf5d6af1be
      requestBody:
        required: true
        content:
          application/json:
            schema:
              title: CompensationEquitySettingsUpdateRequest
              properties:
                calculationType:
                  type: string
                companyValuation:
                  oneOf: [{ type: number }, { type: 'null' }]
                outstandingShares:
                  oneOf: [{ type: integer }, { type: 'null' }]
                pricePerShare:
                  oneOf: [{ type: number }, { type: 'null' }]
                currencyCode:
                  type: string
                sliderMin:
                  oneOf: [{ type: integer }, { type: 'null' }]
                sliderMax:
                  oneOf: [{ type: integer }, { type: 'null' }]
                vestingConditions:
                  oneOf: [{ type: string }, { type: 'null' }]
                disclaimers:
                  oneOf: [{ type: string }, { type: 'null' }]
              type: object
              additionalProperties: true
      responses:
        '200':
          description: 'Settings updated successfully'
          content:
            application/json:
              schema:
                title: CompensationEquitySettingsResponse
                properties:
                  calculationType: { type: string }
                  companyValuation: { oneOf: [{ type: number }, { type: 'null' }] }
                  outstandingShares: { oneOf: [{ type: integer }, { type: 'null' }] }
                  pricePerShare: { oneOf: [{ type: number }, { type: 'null' }] }
                  currencyCode: { type: string }
                  sliderMin: { oneOf: [{ type: integer }, { type: 'null' }] }
                  sliderMax: { oneOf: [{ type: integer }, { type: 'null' }] }
                  vestingConditions: { oneOf: [{ type: string }, { type: 'null' }] }
                  disclaimers: { oneOf: [{ type: string }, { type: 'null' }] }
                type: object
                additionalProperties: true
        '400':
          description: 'Bad request'
        '403':
          description: Forbidden
        '500':
          description: 'Internal server error'
      security:
        -
          oauth:
            - equity.write
  /api/v1/compensation/planning_cycles:
    get:
      tags:
        - 'Compensation Planning'
        - 'Public API'
      summary: 'List compensation planning cycles'
      description: 'List all compensation planning cycles for the company, including status and employee counts.'
      operationId: b65f246186b41a9783a9397c11c703b4
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                title: CompensationPlanningCyclesListResponse
                type: object
                additionalProperties: true
        '403':
          description: Forbidden
        '500':
          description: 'Internal server error'
      security:
        -
          oauth:
            - planning_cycles
    post:
      tags:
        - 'Compensation Planning'
        - 'Public API'
      summary: 'Create compensation planning cycle'
      description: 'Create a new compensation planning cycle with default settings.'
      operationId: e2ac4e1535f296cb8901f209e04caa83
      responses:
        '201':
          description: 'Cycle created successfully'
          content:
            application/json:
              schema:
                title: CompensationPlanningCycleCreateResponse
                type: object
                additionalProperties: true
        '400':
          description: 'Invalid request data'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsResponse'
        '403':
          description: 'Insufficient permissions'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsResponse'
        '500':
          description: 'Internal server error'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsResponse'
      security:
        -
          oauth:
            - planning_cycles.write
  '/api/v1/compensation/planning_cycles/{id}':
    get:
      tags:
        - 'Compensation Planning'
        - 'Public API'
      summary: 'Get compensation planning cycle details'
      description: 'Get compensation planning cycle details and currency settings for a cycle.'
      operationId: 5c2b55158b0950b1e9211655666645b6
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                title: CompensationPlanningCycleDetailsResponse
                type: object
                additionalProperties: true
        '403':
          description: Forbidden
        '500':
          description: 'Internal server error'
      security:
        -
          oauth:
            - planning_cycles
    put:
      tags:
        - 'Compensation Planning'
        - 'Public API'
      summary: 'Update compensation planning cycle'
      description: 'Update compensation planning cycle details and currency settings.'
      operationId: 100b0cf8c5207b35697ff10370fd5fe1
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        description: 'Cycle details and currency settings to update'
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DetailsAndCurrencyRequestDataObject'
      responses:
        '200':
          description: 'Cycle updated successfully'
          content:
            application/json:
              schema:
                title: CompensationPlanningCycleUpdateResponse
                type: object
                additionalProperties: true
        '400':
          description: 'Invalid request data'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsResponse'
        '403':
          description: 'Insufficient permissions'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsResponse'
        '404':
          description: 'Resource not found'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsResponse'
        '500':
          description: 'Internal server error'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsResponse'
      security:
        -
          oauth:
            - planning_cycles.write
    delete:
      tags:
        - 'Compensation Planning'
        - 'Public API'
      summary: 'Delete compensation planning cycle'
      description: 'Delete a compensation planning cycle.'
      operationId: 22ad75be25455279e2987c80851af5fc
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: 'Cycle deleted successfully'
        '403':
          description: 'Insufficient permissions'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsResponse'
        '404':
          description: 'Resource not found'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsResponse'
        '500':
          description: 'Internal server error'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsResponse'
      security:
        -
          oauth:
            - planning_cycles.write
  '/api/v1/compensation/planning_cycles/{id}/summary':
    get:
      tags:
        - 'Compensation Planning'
        - 'Public API'
      summary: 'Get compensation planning cycle summary'
      description: 'Get compensation planning cycle summary (progress, stats).'
      operationId: 9bc279d788f6e86b4cd8b2e0d3de91b1
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                title: CompensationPlanningCycleSummaryResponse
                type: object
                additionalProperties: true
        '400':
          description: 'Bad request'
        '500':
          description: 'Internal server error'
      security:
        -
          oauth:
            - planning_cycles
  '/api/v1/compensation/planning_cycles/{id}/employees':
    get:
      tags:
        - 'Compensation Planning'
        - 'Public API'
      summary: 'List employees in compensation planning cycle'
      description: 'List employees in the compensation planning cycle (picker data: company roster and membership).'
      operationId: a6b8da1348a3151fe95adc03aaf64447
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                title: CompensationPlanningCycleEmployeesResponse
                type: object
                additionalProperties: true
        '403':
          description: Forbidden
        '500':
          description: 'Internal server error'
      security:
        -
          oauth:
            - planning_cycles
    post:
      tags:
        - 'Compensation Planning'
        - 'Public API'
      summary: 'Add employees to cycle'
      description: 'Add employees to a compensation planning cycle.'
      operationId: 3958585c861325ea7a2cd30a8c74f042
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        description: 'Employee IDs to add'
        required: true
        content:
          application/json:
            schema:
              required:
                - employeeIds
              properties:
                employeeIds:
                  description: 'Array of employee IDs to add to the cycle'
                  type: array
                  items: { type: string }
              type: object
      responses:
        '204':
          description: 'Employees added successfully'
        '400':
          description: 'Invalid request data'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsResponse'
        '403':
          description: 'Insufficient permissions'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsResponse'
        '404':
          description: 'Resource not found'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsResponse'
        '500':
          description: 'Internal server error'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsResponse'
      security:
        -
          oauth:
            - planning_cycles.write
    delete:
      tags:
        - 'Compensation Planning'
        - 'Public API'
      summary: 'Remove employees from cycle'
      description: 'Remove employees from a compensation planning cycle.'
      operationId: 89a5068111ec499135c7d6e9a53d5a30
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        description: 'Employee IDs to remove'
        required: true
        content:
          application/json:
            schema:
              required:
                - employeeIds
              properties:
                employeeIds:
                  description: 'Array of employee IDs to remove from the cycle'
                  type: array
                  items: { type: string }
              type: object
      responses:
        '204':
          description: 'Employees removed successfully'
        '400':
          description: 'Invalid request data'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsResponse'
        '403':
          description: 'Insufficient permissions'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsResponse'
        '404':
          description: 'Resource not found'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsResponse'
        '500':
          description: 'Internal server error'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsResponse'
      security:
        -
          oauth:
            - planning_cycles.write
  '/api/v1/compensation/planning_cycles/{id}/budgets':
    get:
      tags:
        - 'Compensation Planning'
        - 'Public API'
      summary: 'Get compensation planning cycle budgets'
      description: 'Get budget guidelines and breakdown for the compensation planning cycle.'
      operationId: 7efceaee2c010f88244dd01ee81e6e7b
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                title: CompensationPlanningCycleBudgetsResponse
                type: object
                additionalProperties: true
        '403':
          description: Forbidden
        '500':
          description: 'Internal server error'
      security:
        -
          oauth:
            - planning_cycles
  '/api/v1/compensation/planning_cycles/{id}/approvals':
    get:
      tags:
        - 'Compensation Planning'
        - 'Public API'
      summary: 'Get compensation planning approval flows'
      description: 'Get approval flows for the compensation planning cycle (grouped by department by default).'
      operationId: 4e886b18264480611f380805301c49c4
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: integer
        -
          name: groupBy
          in: query
          description: 'Optional grouping for flows (e.g. department)'
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                title: CompensationPlanningCycleApprovalsResponse
                type: object
                additionalProperties: true
        '403':
          description: Forbidden
        '404':
          description: 'Cycle not found'
        '500':
          description: 'Internal server error'
      security:
        -
          oauth:
            - planning_cycles
  '/api/v1/compensation/planning_cycles/{id}/admins':
    get:
      tags:
        - 'Compensation Planning'
        - 'Public API'
      summary: 'List compensation planning cycle admins'
      description: 'List compensation planning cycle admins.'
      operationId: b3c51254de6918637a971fe4af382a53
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                title: CompensationPlanningCycleAdminsResponse
                properties:
                  admins: { description: 'List of admins for the cycle', type: array, items: { properties: { employeeId: { description: 'ID of the employee associated with this admin. Null if user has no associated employee.', oneOf: [{ type: string }, { type: 'null' }] }, displayName: { description: 'Display name of the admin', type: string }, firstName: { description: 'First name of the admin', type: string }, lastName: { description: 'Last name of the admin', type: string }, jobTitle: { description: 'Job title of the admin', type: string }, photoUrl: { description: 'URL to the admin profile photo', type: string }, adminType: { description: 'Type of admin', type: string, enum: [FULL_ACCOUNT_ADMIN, CYCLE_ADMIN] }, isRemovable: { description: 'Whether this admin can be removed from the cycle', type: boolean }, addedAt: { description: 'ISO 8601 timestamp when the admin was added. Null for full account admins.', oneOf: [{ type: string, format: date-time }, { type: 'null' }] }, addedByEmployeeId: { description: 'ID of the employee who added this admin. Null for full account admins or if user has no associated employee.', oneOf: [{ type: string }, { type: 'null' }] } }, type: object } }
                  isFullAdmin: { description: 'Whether the requesting user is a full compensation plan admin', type: boolean }
                type: object
        '403':
          description: Forbidden
        '404':
          description: 'Not found'
        '500':
          description: 'Internal server error'
      security:
        -
          oauth:
            - planning_cycles
    post:
      tags:
        - 'Compensation Planning'
        - 'Public API'
      summary: 'Add cycle admins'
      description: 'Add one or more cycle admins by employee IDs.'
      operationId: c7c32ed5278ac67e2e518bf7484a75dc
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - employeeIds
              properties:
                employeeIds:
                  description: 'Array of employee IDs to add as cycle admins'
                  type: array
                  items: { type: string }
                notifyAdmins:
                  description: 'Whether to send email notifications to new admins'
                  type: boolean
              type: object
      responses:
        '200':
          description: 'Result of adding cycle admins'
          content:
            application/json:
              schema:
                title: AddCycleAdminsResponse
                properties:
                  added: { type: array, items: { properties: { employeeId: { type: string }, displayName: { type: string } }, type: object } }
                  skipped: { type: array, items: { properties: { employeeId: { type: string }, reason: { type: string, enum: [ALREADY_ADMIN, EMPLOYEE_NOT_FOUND, FULL_ACCOUNT_ADMIN] } }, type: object } }
                type: object
        '403':
          description: Forbidden
        '404':
          description: 'Not found'
        '500':
          description: 'Internal server error'
      security:
        -
          oauth:
            - planning_cycles.write
  '/api/v1/compensation/planning_cycles/{id}/change_comm':
    get:
      tags:
        - 'Compensation Planning'
        - 'Public API'
      summary: 'Get change communication letter details'
      description: 'Get change communication letter details for the compensation planning cycle.'
      operationId: d6987e300672a00c7cfe59afebb64156
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                title: CompensationPlanningCycleChangeCommResponse
                type: object
                additionalProperties: true
        '403':
          description: Forbidden
        '500':
          description: 'Internal server error'
      security:
        -
          oauth:
            - planning_cycles
  '/api/v1/compensation/planning_cycles/{id}/worksheet':
    get:
      tags:
        - 'Compensation Planning'
        - 'Public API'
      summary: 'Get compensation planning cycle worksheet'
      description: 'Get compensation planning worksheet details for the cycle (recommendations, approvals, or overview context). Omit `type` to use the default view for the current user.'
      operationId: 329acecaa6df729733d0752aa9f6b204
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: integer
        -
          name: type
          in: query
          description: 'Worksheet context: recommendations, approvals, or overview (overview requires cycle admin).'
          required: false
          schema:
            type: string
            enum:
              - recommendations
              - approvals
              - overview
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                title: CompensationPlanningCycleWorksheetResponse
                type: object
                additionalProperties: true
        '400':
          description: 'Bad request'
        '403':
          description: Forbidden
        '500':
          description: 'Internal server error'
      security:
        -
          oauth:
            - planning_cycles
  '/api/v1/compensation/planning_cycles/{id}/worksheet/export':
