  '/api/v1/employees/{employeeId}/time_off/request':
    put:
      tags:
        - 'Time Off'
        - 'Public API'
      summary: 'Create Time Off Request'
      description: "Creates a time off request for an employee. The request can be submitted with a status of `approved`, `denied`, or `requested`. Submitting `approved` or `denied` is only honored when the caller is an owner/admin or has view/edit access to the time off type field for the target employee; other callers receive 403. When honored, these statuses record the request directly and suppress approval notifications. Supplying a `previousRequest` ID performs a destructive supersede: the prior request's status is set to `superceded`, all approvals on its workflow are removed and the workflow is marked deleted, and any home-page notifications tied to that workflow are deleted. Accepts both JSON and XML request bodies."
      operationId: create-time-off-request
      parameters:
        -
          name: employeeId
          in: path
          description: 'The ID of the employee to create the time off request for.'
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TimeOffRequest'
          application/xml:
            schema:
              $ref: '#/components/schemas/TimeOffRequest'
      responses:
        '201':
          description: 'Request created. The `Location` header contains the URL of the new request. When `Accept: application/json` is set, the response body contains the full created request — use the `id` field to chain follow-up operations (e.g. approve, cancel, supersede) without a separate lookup.'
          content:
            application/json:
              schema:
                title: CreatedTimeOffRequest
                properties:
                  id: { description: 'The newly created time off request ID. Use this to chain follow-up operations such as approving, canceling, or superseding the request.', type: integer, example: 1668 }
                  employeeId: { description: 'The ID of the employee the request was created for.', type: integer }
                  name: { description: "The employee's full name. Only present when the employee record could be loaded.", type: string }
                  start: { description: 'The start date of the request in YYYY-MM-DD format.', type: string, format: date }
                  end: { description: 'The end date of the request in YYYY-MM-DD format.', type: string, format: date }
                  created: { description: 'The date the request was created in YYYY-MM-DD format (company timezone).', type: string, format: date }
                  status: { description: 'The current status of the request.', properties: { status: { description: 'The current status value (e.g. `approved`, `denied`, `requested`).', type: string }, lastChanged: { description: 'The date and time the status was last changed, formatted as `YYYY-MM-DD HH:MM:SS` in the company timezone.', type: string }, lastChangedByUserId: { description: 'The user ID who last changed the status.', type: integer } }, type: object }
                  type: { description: 'The time off type for this request. Only present when the underlying time off type record could be loaded.', properties: { id: { description: 'The time off type ID.', type: integer }, name: { description: 'The time off type name.', type: string } }, type: object }
                  amount: { description: 'The amount of time off requested. Only present when the underlying time off type record could be loaded.', properties: { unit: { description: 'The unit of measurement.', type: string, enum: [hours, days] }, amount: { description: 'The total amount requested.', type: number } }, type: object }
                  dates: { description: 'A map of dates (YYYY-MM-DD) to daily amounts. Only present when daily details were attached to the request.', type: object, additionalProperties: { type: number } }
                  notes: { description: 'Notes from employee and/or manager. The object is always present; the `employee` and `manager` keys are each included only when a non-empty note was provided.', properties: { employee: { description: 'Note from the employee.', type: string }, manager: { description: 'Note from the manager.', type: string } }, type: object }
                  comments: { description: 'Comments attached to the request. Always present; empty array when no comments exist.', type: array, items: { type: object } }
                  approvers: { description: 'The approval chain for this request. Only present when the request has approvers.', type: array, items: { $ref: '#/components/schemas/EmployeeTimeOffRequestApproverResponse' } }
                  actions: { description: 'Actions the current user can perform on this request. Only present when PTO action permissions are available. Keys are restricted to `view`, `edit`, `cancel`, `approve`, `deny`, `bypass`; values are booleans.', type: object, additionalProperties: { type: boolean } }
                  overlappingRequests: { description: 'Other existing time off requests whose date ranges overlap this request. Only present when overlap data was loaded with the request.', type: array, items: { type: object } }
                  policyType: { description: 'The policy type backing this request (e.g. accruing, manual, unlimited).', type: string }
                  usedYearToDate: { description: 'Amount of this time off type the employee has used year-to-date as of the request date.', oneOf: [{ type: number }, { type: 'null' }] }
                  balanceOnDateOfRequest: { description: "The employee's balance for this time off type on the date of the request.", oneOf: [{ type: number }, { type: 'null' }] }
                type: object
        '400':
          description: 'Malformed JSON or XML, an invalid time off type, an invalid previous request ID, or other invalid request data.'
          content:
            application/json: {  }
        '401':
          description: 'Unauthorized. Invalid API credentials.'
        '403':
          description: 'Forbidden. The caller does not have permission to create or record this request for the employee, time off type, or requested status.'
          content:
            application/json: {  }
        '404':
          description: 'Employee not found.'
          content:
            application/json: {  }
        '422':
          description: 'Unprocessable entity. Returned when a remote/EOR time off request cannot be created for the requested action.'
          content:
            application/json: {  }
      security:
        -
          basic: []
        -
          oauth:
            - time_off.write
