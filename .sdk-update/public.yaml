        - scheduleId
        - status
        - color
        - start
        - end
        - timezone
      properties:
        id:
          description: 'The ID of the shift. This can be the UUIDv7 of the shift instance, or a composite ID (<recurringShiftDefinitionId>_<recurrenceId>) for uninstantiated recurring shifts.'
          type: string
          readOnly: true
          example: 019aa09f-0712-74cb-9186-8ad0eb6038dc_20240101T093000
        scheduleId:
          description: 'The ID of the schedule the shift belongs to.'
          type: string
          format: uuid
          example: 0199de9b-6bcb-77e7-941d-3caf74b9a372
        name:
          description: 'The name of the shift.'
          example: 'Morning Shift'
          oneOf:
            -
              type: string
            -
              type: 'null'
        status:
          description: 'The status of the shift.'
          enum:
            - planned
            - published
            - cancelled
            - deleted
        color:
          description: '6 character color hex code.'
          type: string
          example: 00FFAA
        capacity:
          description: 'The expected headcount for the shift. Defaults to 1 if unset.'
          example: 1
          oneOf:
            -
              type: integer
            -
              type: 'null'
        start:
          description: 'UTC timestamp of the start of the shift.'
          example: '2025-01-01T06:00:00Z'
          oneOf:
            -
              type: string
              format: date-time
            -
              type: 'null'
        end:
          description: 'UTC timestamp of the end of the shift.'
          example: '2025-01-01T14:00:00Z'
          oneOf:
            -
              type: string
              format: date-time
            -
              type: 'null'
        timezone:
          description: 'The timezone for the shift.'
          type: string
          example: America/Denver
        recurrenceRule:
          description: 'The recurrence rule. Follows the iCalendar RFC 5545 RRULE syntax.'
          example: FREQ=WEEKLY;INTERVAL=1
          oneOf:
            -
              type: string
            -
              type: 'null'
        recurrenceId:
          description: 'The stable identifier for a recurrence, which is the original start of shift according to recurrence rules. Null for non-recurring shifts.'
          example: 20240101T090000
          oneOf:
            -
              type: string
            -
              type: 'null'
        recurrenceDtstart:
          description: 'The UTC start time for a recurring shift and the anchor point for the recurrence rule. Null for non-recurring shifts.'
          example: '2024-01-01T09:00:00Z'
          oneOf:
            -
              type: string
            -
              type: 'null'
        recurrenceDtend:
          description: 'The UTC end time for a recurring shift. Null for non-recurring shifts.'
          example: '2024-12-31T23:59:59Z'
          oneOf:
            -
              type: string
            -
              type: 'null'
        recurrenceUntil:
          description: 'The UTC datetime when the recurrence series stops generating new occurrences (UNTIL in RRULE). Null for non-recurring shifts.'
          example: '2024-12-31T23:59:59Z'
          oneOf:
            -
              type: string
            -
              type: 'null'
        employeeIds:
          description: 'The list of employee IDs currently assigned.'
          type: array
          items:
            type: integer
          example:
            - 10
            - 20
        unpublishedChanges:
          description: 'The pending changes that have not been published.'
          oneOf:
            -
              type: object
            -
              type: 'null'
        createdAt:
          description: 'UTC timestamp when the shift was created'
          type: string
          format: date-time
          readOnly: true
          example: '2025-01-01T06:00:00Z'
        updatedAt:
          description: 'UTC timestamp when the shift was last updated'
          readOnly: true
          example: '2025-01-01T06:00:00Z'
          oneOf:
            -
              type: string
              format: date-time
            -
              type: 'null'
        deletedAt:
