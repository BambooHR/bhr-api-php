                  internalJobPayBand: { description: 'Company-configured internal pay band for this job.', properties: { median: { type: number }, min: { type: number }, max: { type: number }, currencyCode: { type: string }, originalMedian: { oneOf: [{ type: number }, { type: 'null' }] }, originalMin: { oneOf: [{ type: number }, { type: 'null' }] }, originalMax: { oneOf: [{ type: number }, { type: 'null' }] }, originalCurrencyCode: { oneOf: [{ type: string }, { type: 'null' }] }, description: { oneOf: [{ type: string }, { type: 'null' }] } }, oneOf: [{ type: object }, { type: 'null' }] }
                  benchmarkValues: { description: 'All saved benchmarks for this job/location. Empty when no benchmarks exist.', type: array, items: { properties: { id: { type: integer }, jobTitle: { oneOf: [{ type: string }, { type: 'null' }] }, lastEdited: { oneOf: [{ type: string }, { type: 'null' }] }, sourceColorCode: { oneOf: [{ type: string }, { type: 'null' }] }, sourceDate: { oneOf: [{ type: string }, { type: 'null' }] }, createdYmdt: { oneOf: [{ type: string }, { type: 'null' }] }, updatedYmdt: { oneOf: [{ type: string }, { type: 'null' }] }, dataYear: { oneOf: [{ type: string }, { type: 'null' }] }, median: { type: number }, min: { type: number }, max: { type: number }, currencyCode: { type: string } }, type: object } }
