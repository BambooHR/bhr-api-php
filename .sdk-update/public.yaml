          description: 'The ID of the shift that failed to publish.'
          type: string
          example: 019aa09f-0712-74cb-9186-8ad0eb6038dc
        reason:
          description: 'The reason the shift failed to publish.'
          type: string
          example: 'Employee is already assigned to a published shift that overlaps with this shift.'
