  /api/v1/benefits/member-benefits:
    get:
      tags:
        - Benefits
        - 'Public API'
      summary: 'List Member Benefits'
      description: 'Returns a paginated list of benefit enrollment records for all members (employees and dependents) in the company for a given calendar year. Each record represents one member and includes the plans they held and the date ranges during which they held each enrollment status. Dependents appear alongside their subscribing employee via subscriberId. Use "List Company Benefits" to get valid planId values.'
      operationId: list-member-benefits
      parameters:
        -
          name: calendarYear
          in: query
          description: 'The 4-digit calendar year (YYYY) to retrieve benefit enrollment data for.'
          required: true
          schema:
            type: string
            pattern: '^\d{4}$'
            example: '2024'
        -
          name: page
          in: query
          description: 'The 1-based page number for pagination. The value is cast to an integer; values that cast to 0 or below are rejected with a 400. Defaults to 1.'
          required: false
          schema:
            type: string
            default: '1'
            example: '1'
        -
          name: pageSize
          in: query
          description: 'The number of items per page. The value is cast to an integer; values that cast to 0 or below, or to 100 or above, are rejected with a 400. Defaults to 25.'
          required: false
          schema:
            type: string
            default: '25'
            example: '25'
      responses:
        '200':
          description: 'A paginated list of member benefit enrollment records for the requested calendar year.'
          content:
            application/json:
              schema:
                title: MemberBenefitsGetSuccessResponse
                properties:
                  data: { type: array, items: { properties: { memberId: { description: 'The member identifier. Formatted as "employee.{id}" for employees and "dependent.{id}" for dependents.', type: string }, subscriberId: { description: 'The employee ID of the plan subscriber as a string. For dependent members, this is the ID of the employee they are enrolled under.', type: string }, plans: { type: array, items: { properties: { planId: { description: 'The benefit plan ID.', type: string }, dateRanges: { type: array, items: { properties: { startDate: { description: 'Start date of the enrollment period (YYYY-MM-DD).', type: string, format: date }, endDate: { description: 'End date of the enrollment period (YYYY-MM-DD), or null if the enrollment has no calculated end date.', oneOf: [{ type: string, format: date }, { type: 'null' }] }, status: { description: 'The enrollment status for this date range.', type: string, enum: [ENROLLED, WAIVED, TERMINATED, WITHDREW, ELIGIBLE, INELIGIBLE] } }, type: object } } }, type: object } } }, type: object } }
                  meta: { properties: { page: { description: 'The current page number.', type: integer }, pageSize: { description: 'The number of items per page.', type: integer }, totalPages: { description: 'Total number of pages available.', type: integer }, totalItems: { description: 'Total number of member records across all pages.', type: integer } }, type: object }
                  _links: { properties: { next: { properties: { href: { description: 'URL for the next page of results. Points to the current page when already on the last page.', type: string } }, type: object }, prev: { properties: { href: { description: 'URL for the previous page of results. Points to page 1 when already on the first page.', type: string } }, type: object } }, type: object }
                type: object
        '400':
          description: 'Validation error. Returned when calendarYear is missing or not a 4-digit year, or when page or pageSize are out of range.'
          content:
            application/json:
              schema:
                title: MemberBenefitsGetValidationErrorResponse
                properties:
                  code: { type: string, example: VALIDATION_ERROR }
                  message: { type: string, example: 'required property calendarYear is missing' }
                type: object
        '403':
          description: 'Permission denied. The authenticated user is not a benefit admin.'
          content:
            application/json:
              schema:
                title: MemberBenefitsGetPermissionDeniedResponse
                properties:
                  code: { type: string, example: PERMISSION_DENIED }
                  message: { type: string, example: 'Must be benefit admin user' }
                type: object
      security:
        -
          basic: []
        -
          oauth:
            - benefit
  /api/v1/benefits/settings/deduction_types/all:
    get:
      tags:
        - Benefits
        - 'Public API'
      summary: 'List Benefit Deduction Types'
      description: 'Returns all benefit deduction types available in the system. Each deduction type describes a category of payroll deduction (e.g. 401(k), HSA, Section 125) along with its allowable benefit plan types, default deduction code, and optional sub-types. Some deduction types are grouped under a parent with sub-types (e.g. Pre-Tax groups Health, Dental, etc.); in that case the parent entry has a non-empty `subTypes` array. Requires Benefits Administration permissions.'
      operationId: list-benefit-deduction-types
      responses:
        '200':
          description: 'An array of benefit deduction type objects.'
          content:
            application/json:
              schema:
                title: BenefitDeductionTypesResponse
                type: array
                items:
                  title: BenefitDeductionType
                  properties: { id: { description: 'The deduction type ID. Integer for leaf types (e.g. 1 for 401(k)); string slug for grouped parent types (e.g. "pretax_subtype").', oneOf: [{ type: integer }, { type: string }] }, deductionTypeName: { description: 'The display name of the deduction type.', type: string }, defaultDeductionCode: { description: 'The default payroll deduction code for this type.', type: string }, allowableBenefitTypes: { description: 'The benefit plan types this deduction type can be applied to (e.g. "health", "dental", "retirement").', type: array, items: { type: string } }, nonBenefitDeductionType: { description: 'Whether this is a non-benefit deduction type (e.g. garnishments).', type: boolean }, canBeCollectedByTrax: { description: 'Whether this deduction type can be collected via Trax Payroll.', type: boolean }, additionalDescription: { description: 'An optional additional description for display purposes.', type: string }, hideAnnualMax: { description: 'Whether the annual maximum field should be hidden for this deduction type.', type: boolean }, managedDeductionType: { description: 'The managed deduction type identifier, if applicable. Null if not managed.', oneOf: [{ type: string }, { type: 'null' }] }, subTypes: { description: 'Child deduction types grouped under this parent. Each entry has the same shape as a top-level deduction type. Empty array if this type has no sub-types.', type: array, items: { title: BenefitDeductionSubType, properties: { id: { description: 'The sub-type deduction type ID (always an integer).', type: integer }, deductionTypeName: { description: 'The display name of the sub-type.', type: string }, defaultDeductionCode: { description: 'The default payroll deduction code for this sub-type.', type: string }, allowableBenefitTypes: { description: 'Benefit plan types this sub-type applies to.', type: array, items: { type: string } }, nonBenefitDeductionType: { description: 'Whether this is a non-benefit deduction type.', type: boolean }, canBeCollectedByTrax: { description: 'Whether this sub-type can be collected via Trax Payroll.', type: boolean }, additionalDescription: { description: 'Additional description for display purposes.', type: string }, hideAnnualMax: { description: 'Whether the annual maximum field should be hidden.', type: boolean }, managedDeductionType: { description: 'The managed deduction type identifier, if applicable. Null if not managed.', oneOf: [{ type: string }, { type: 'null' }] }, subTypes: { description: 'Always an empty array for sub-types.', type: array, items: { type: object } }, subTypeText: { description: 'Sub-type selection label. Empty string for leaf types.', type: string }, deductionNote: { description: 'Informational note for this sub-type.', type: string }, deductionNoteLink: { description: 'URL for the deduction note link.', type: string }, deductionNoteLinkText: { description: 'Display text for the deduction note link.', type: string } }, type: object } }, subTypeText: { description: 'A label or question displayed alongside sub-type selection (e.g. "Reportable on the W-2?"). Empty string for types without sub-types.', type: string }, deductionNote: { description: 'An informational note to display to the user when configuring this deduction type.', type: string }, deductionNoteLink: { description: 'A URL for a "learn more" link associated with the deduction note.', type: string }, deductionNoteLinkText: { description: 'The display text for the deduction note link.', type: string } }
                  type: object
        '403':
          description: 'The authenticated user does not have Benefits Administration permissions.'
        '500':
          description: 'An unexpected server error occurred.'
      security:
        -
          basic: []
        -
          oauth:
            - benefit
  /api/v1/company-profile-data/industry-codes:
    put:
      tags:
        - 'Public API'
        - Company
      summary: 'Update Company Industry Codes'
      description: 'Updates the industry codes associated with a company.'
      operationId: put-company-industry-codes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - industryIds
              properties:
                industryIds:
                  description: 'List of industry IDs associated with the company. Currently limited to a single entry.'
                  type: array
                  items: { type: integer }
              type: object
            example:
              industryIds:
                - 1
      responses:
        '200':
          description: 'Returns the updated list of enabled industries for the company'
          content:
            application/json:
              schema:
                title: UpdateCompanyIndustryCodesResponse
                properties:
                  company_industries: { $ref: '#/components/schemas/CompanyIndustryCollection', description: 'List of enabled industries for the company' }
                type: object
                example:
                  company_industries: [{ industryId: 4, addedByCustomer: false, addedByUserId: 1, addedYmdt: '2021-09-01T12:00:00+00:00' }]
        '400':
          description: 'Bad request due to invalid request structure or multiple industry IDs provided'
          content:
            application/json:
              schema:
                title: UpdateCompanyIndustryCodes400Response
                properties:
                  message: { type: string }
                type: object
                example:
                  message: 'Multiple industries per-company are not supported at this time.'
        '401':
          description: 'Missing or invalid authentication'
        '403':
          description: 'Insufficient permissions or release toggle not enabled'
          content:
            application/json:
              schema:
                title: UpdateCompanyIndustryCodes403Response
                properties:
                  message: { type: string }
                type: object
                example:
                  message: 'You do not have permission to access this resource.'
        '404':
          description: 'Industry ID not found'
          content:
            application/json:
              schema:
                title: UpdateCompanyIndustryCodes404Response
                properties:
                  message: { type: string }
                type: object
                example:
                  message: 'The requested industry ID does not exist.'
        '500':
          description: 'Internal server error'
          content:
            application/json:
              schema:
                title: UpdateCompanyIndustryCodes500Response
                properties:
                  message: { type: string }
                type: object
                example:
                  message: 'An error occurred while processing your request.'
      security:
        -
          oauth:
            - 'company:details.write'
  /api/v1/company_information:
    get:
