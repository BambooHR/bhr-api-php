        billable:
          description: 'Indicates if the task is billable. Defaults to true if not provided.'
          type: boolean
      type: object
    Scheduling-CreateSchedulingShiftRequest-V1:
      description: 'Fields required to create a scheduling shift.'
      required:
        - scheduleId
        - status
        - color
        - timezone
        - start
        - end
      properties:
        scheduleId:
          description: 'The ID of the schedule the shift belongs to.'
          type: string
          format: uuid
          example: 0199de9b-6bcb-77e7-941d-3caf74b9a372
        name:
          description: 'The name of the shift.'
          example: 'Morning Shift'
          oneOf:
            -
              type: string
            -
              type: 'null'
        status:
          description: 'The status of the shift.'
          enum:
            - planned
            - published
        color:
          description: '6 character color hex code.'
          type: string
          maxLength: 6
          minLength: 6
          example: 00FFAA
        timezone:
          description: 'The timezone for the shift. Defaults to schedule timezone.'
          example: America/Denver
        capacity:
          description: 'The expected headcount for the shift. If null, has no restrictions.'
          default: null
          example: 1
          oneOf:
            -
              type: integer
              minimum: 1
            -
              type: 'null'
        employeeIds:
          description: 'What employees are assigned to this shift?'
          type: array
          items:
            type: integer
          default: []
        start:
          description: 'UTC timestamp of the start of the shift.'
          type: string
          format: date-time
          example: '2025-01-01T06:00:00Z'
        end:
          description: 'UTC timestamp of the end of the shift.'
          type: string
          format: date-time
          example: '2025-01-01T14:00:00Z'
        recurrenceRule:
          description: 'The recurrence rule. Follows the iCalendar RFC 5545 RRULE syntax.'
          example: FREQ=WEEKLY;INTERVAL=1
          oneOf:
            -
              type: string
            -
              type: 'null'
        recurrenceDtstart:
          description: 'The UTC start time for a recurring shift (anchor point for the recurrence rule).'
          example: '2024-01-01T09:00:00Z'
          oneOf:
            -
              type: string
            -
              type: 'null'
        recurrenceDtend:
          description: 'The UTC end time for a recurring shift.'
          example: '2024-12-01T17:00:00Z'
          oneOf:
            -
              type: string
            -
              type: 'null'
        recurrenceUntil:
          description: 'The UTC datetime when the recurrence series stops generating new occurrences (UNTIL in RRULE).'
          example: '2024-12-31T23:59:59Z'
          oneOf:
            -
              type: string
            -
              type: 'null'
      type: object
    Scheduling-UpdateSchedulingShiftRequest-V1:
      description: 'Fields for updating a scheduling shift. All fields are optional, and only provided fields will be updated. recurrenceEditOption is required when the shift already has recurrence settings.'
      properties:
        name:
          description: 'The name of the shift'
          example: 'Front Desk - Morning'
          oneOf:
            -
              type: string
            -
              type: 'null'
        color:
          description: '6 character color hex code.'
          type: string
          maxLength: 6
          minLength: 6
          example: 00FFAA
        capacity:
          description: 'The expected headcount for the shift. If null, has no restrictions.'
          default: null
          example: 3
          oneOf:
            -
              type: integer
              minimum: 1
            -
              type: 'null'
        start:
          description: 'UTC timestamp of the start of the shift.'
          type: string
          format: date-time
          example: '2026-01-14T16:00:00Z'
        end:
          description: 'UTC timestamp of the end of the shift.'
          type: string
          format: date-time
          example: '2026-01-14T20:00:00Z'
        timezone:
          description: 'The timezone for the shift.'
          type: string
          example: America/Denver
        recurrenceRule:
          description: 'The recurrence rule. Follows the iCalendar RFC 5545 RRULE syntax.'
          example: 'FREQ=WEEKLY;BYDAY=MO,WE;INTERVAL=1'
          oneOf:
            -
              type: string
            -
              type: 'null'
        recurrenceEditOption:
          description: 'How should recurrence edits be effective? Edits will not affect any realized shifts regardless of option.'
          type: string
          enum:
            - instance
            - future
            - all
          example: future
        recurrenceDtstart:
          description: 'The UTC start time for a recurring shift and the anchor point for the recurrence rule.'
          example: '2026-01-14T09:00:00Z'
          oneOf:
            -
              type: string
              format: date-time
            -
              type: 'null'
        recurrenceDtend:
          description: 'The UTC end time for a recurring shift.'
          example: '2026-01-14T17:00:00Z'
          oneOf:
            -
              type: string
              format: date-time
            -
              type: 'null'
        recurrenceUntil:
          description: 'The UTC datetime when the recurrence series stops generating new occurrences (UNTIL in RRULE).'
          example: '2026-03-31T17:00:00Z'
          oneOf:
            -
              type: string
              format: date-time
            -
              type: 'null'
        employeeIds:
          description: 'What employees are assigned to this shift?'
          type: array
          items:
            type: integer
        unpublishedChanges:
          description: 'The pending changes that have not been published. Only accepts null to clear unpublished changes.'
          type: 'null'
      type: object
