                  meta: { properties: { totalItems: { description: 'Total number of schedules matching the filter.', type: integer }, page: { description: 'Current page number.', type: integer }, pageSize: { description: 'Number of items per page.', type: integer } }, type: object }
                  _links: { properties: { prev: { description: 'Link to the previous page, or null if on the first page.', properties: { href: { description: 'URL for the previous page.', type: string } }, oneOf: [{ type: object }, { type: 'null' }] }, next: { description: 'Link to the next page, or null if on the last page.', properties: { href: { description: 'URL for the next page.', type: string } }, oneOf: [{ type: object }, { type: 'null' }] } }, type: object }
                type: object
        '400':
          description: 'Bad request - invalid filter, sort, or pagination parameters.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsResponse'
        '403':
          description: 'Forbidden - insufficient permissions.'
