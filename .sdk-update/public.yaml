      tags:
        - 'Company Profile'
        - 'Public API'
      summary: 'Update company information (phone, address, legal name)'
      description: 'Updates legal name, phone, and/or address for the company (application/merge-patch+json). String fields must be JSON strings (not numbers). Response matches GET /api/v1/company-profile-data.'
      operationId: patch-company-profile-company-information
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              properties:
                legalName:
                  description: 'Legal name of the company (name_of_employer). Required (non-empty) when this field is present in the patch.'
                  type: string
                phone:
                  description: 'Contact phone number. Required (non-empty) when this field is present in the patch.'
                  type: string
                address:
                  description: 'Company address. When `address` is included in the patch (non-null object), `city`, `state`, and `zip` must all be sent as non-empty strings. `line1` and `line2` are optional (JSON null removes a line per merge-patch).'
                  properties: { line1: { description: 'Street address line 1 (employerAddress). Optional; JSON null removes the value per merge-patch semantics.', oneOf: [{ type: string }, { type: 'null' }] }, line2: { description: 'Street address line 2 (employerAddress). Optional; JSON null removes the value per merge-patch semantics.', oneOf: [{ type: string }, { type: 'null' }] }, city: { description: 'City. Required (non-empty) when address is patched.', type: string }, state: { description: 'State. Required (non-empty) when address is patched.', type: string }, zip: { description: 'Zip or postal code. Required (non-empty) when address is patched.', type: string } }
                  type: object
              type: object
      responses:
        '200':
          description: 'Successful response; same shape as GET company-profile-data'
          content:
            application/json:
              schema:
                title: CompanyProfileData
                properties:
                  id: { type: integer }
                  subdomain: { oneOf: [{ type: string }, { type: 'null' }] }
                  legalName: { oneOf: [{ type: string }, { type: 'null' }] }
                  displayName: { oneOf: [{ type: string }, { type: 'null' }] }
                  address: { properties: { line1: { oneOf: [{ type: string }, { type: 'null' }] }, line2: { oneOf: [{ type: string }, { type: 'null' }] }, city: { oneOf: [{ type: string }, { type: 'null' }] }, state: { oneOf: [{ type: string }, { type: 'null' }] }, zip: { oneOf: [{ type: string }, { type: 'null' }] } }, type: object }
                  phone: { oneOf: [{ type: string }, { type: 'null' }] }
                  status: { type: string }
                  terminationDate: { oneOf: [{ type: string }, { type: 'null' }] }
                  industryCode: { oneOf: [{ type: string }, { type: 'null' }] }
                type: object
        '400':
          description: 'Invalid JSON or Content-Type'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsResponse'
        '403':
          description: 'Permission denied'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsResponse'
        '422':
          description: 'Validation failed (invalid field types or incomplete profile after merge)'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsResponse'
        '500':
          description: 'Internal server error'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsResponse'
      security:
        -
          oauth:
            - 'company:details.write'
