  '/api/v1/employee-verifications/users/{userId}/send-email':
    post:
      tags:
        - EmployeeVerification
        - 'Public API'
      summary: 'Send employee verification lifecycle email by user and email type'
      description: 'Accepts a Bamboo `userId` (path) and an `emailType` (body) and queues the corresponding employee verification lifecycle email—the same templates as the in-app auth listener (`signup_survey` after signup, `app_installed` after the integration app is installed). Delivered to the company owner contact with template context for that user id. Not an employee I-9 reminder. Requires the employee verification integration enabled, onboarding edit access, and `employee_verifications.write`.'
      operationId: send-employee-verification-lifecycle-email-by-user
      parameters:
        -
          name: userId
          in: path
          description: 'Bamboo user id for the requesting user in the email template (same role as the listener’s event user id). Together with body `emailType`, selects which verification email to send.'
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - emailType
              properties:
                emailType:
                  description: 'Which employee verification lifecycle email to send; must be {@see EverifyEmailType::SIGNUP_SURVEY} or {@see EverifyEmailType::APP_INSTALLED} (string values `signup_survey`, `app_installed`).'
                  type: string
                  enum: [signup_survey, app_installed]
              type: object
      responses:
        '202':
          description: 'Request accepted; email has been queued for delivery.'
          content:
            application/json:
              schema:
                title: EmployeeVerificationLifecycleEmailAcceptedResponse
                required:
                  - status
                properties:
                  status: { type: string, example: accepted }
                  message: { type: string, example: 'Employee verification email has been queued for delivery.' }
                type: object
                additionalProperties: true
        '400':
          description: 'Bad request (invalid body, unknown user id, or integration disabled)'
        '403':
          description: Forbidden
        '500':
          description: 'Internal server error'
      security:
        -
          oauth:
            - employee_verifications.write
  '/api/v1/employee-verifications/employees/{employeeId}/{verificationId}':
    put:
      tags:
        - EmployeeVerification
        - 'Public API'
      summary: 'Update an employee verification record'
      description: 'Partial update of a single employee verification row. Any field omitted from the request body is left unchanged. Returns 404 when the verification id does not exist or does not belong to {employeeId}. Most verification updates flow in via partner webhooks; this endpoint exists for admin-level integrations that need to correct or annotate a record out-of-band, and requires onboarding view-and-edit permission on the employee.'
      operationId: update-employee-verification
      parameters:
        -
          name: employeeId
          in: path
          description: 'Company employee id that owns the verification row.'
          required: true
          schema:
            type: integer
            format: int64
        -
          name: verificationId
          in: path
          description: 'Identifier of the verification record to update.'
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        description: 'Fields to update on the verification record. At least one field must be supplied.'
        required: true
        content:
          application/json:
            schema:
              properties:
                verificationType:
                  oneOf: [{ type: string, enum: [in-person, hybrid, remote] }, { type: 'null' }]
                verificationStatus:
                  oneOf: [{ type: string, enum: [pending, inprogress-section-1, inprogress-section-2, completed, failed] }, { type: 'null' }]
                verificationStatusNotes:
                  oneOf: [{ type: string }, { type: 'null' }]
                remoteAccessUrl:
                  oneOf: [{ type: string }, { type: 'null' }]
                eVerifyStatus:
                  oneOf: [{ type: string, enum: [pending, inprogress, completed, failed] }, { type: 'null' }]
              type: object
      responses:
        '200':
          description: 'Success — returns the updated verification record.'
          content:
            application/json:
              schema:
                title: EmployeeVerificationUpdateResponse
                required:
                  - employeeVerification
                properties:
                  employeeVerification: { $ref: '#/components/schemas/EmployeeVerificationPublicApiRecord' }
                type: object
        '400':
          description: 'Invalid request body (unknown enum value or no updatable fields supplied).'
        '403':
          description: Forbidden
        '404':
