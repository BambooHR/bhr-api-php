      summary: 'List Schedules'
      description: 'Retrieves a paginated list of all schedules for the company. Supports optional OData-style filtering and sorting.'
      operationId: scheduling-list-schedules
      parameters:
        -
          name: filter
          in: query
          description: "OData filter expression applied to schedules. Supported operators: `eq` (equals, use `eq null` to match NULL), `ne` (not equals, use `ne null` to match NOT NULL), `lt` (less than), `le` (less than or equal), `gt` (greater than), `ge` (greater than or equal), `in` (value in list), `and` (combine clauses). Not supported: `or`, `not`, parenthesized grouping. Filterable fields: `id`, `name`, `locationId`, `timezone`, `startOfWeek`, `earlyClockInThreshold`, `createdAt`, `updatedAt`, `deletedAt`. Examples: `name eq 'Default Schedule'`, `deletedAt eq null`, `name eq 'Default Schedule' and locationId in (1, 2)`."
          required: false
          schema:
            type: string
        -
          name: sort
          in: query
          description: 'Sorting options. Supported sorts are: name, locationId, timezone, startOfWeek, earlyClockInThreshold, createdAt, updatedAt, deletedAt'
          required: false
          schema:
            type: string
        -
          name: page
          in: query
          description: 'The starting page for pagination'
          required: false
          schema:
            type: integer
            default: 1
        -
          name: pageSize
          in: query
          description: 'The number of items to be returned'
          required: false
          schema:
            type: integer
            default: 100
      responses:
        '200':
          description: 'A list of schedules'
          content:
