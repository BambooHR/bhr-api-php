                $ref: '#/components/schemas/WebhookError'
        '404':
          description: 'No webhook exists with the given ID.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookError'
        '500':
          description: 'Internal error'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookError'
      security:
        -
          basic: []
        -
          oauth:
