        - Goals
        - 'Public API'
      summary: 'Create Goal'
      description: 'Create a new goal for an employee.'
      operationId: create-goal
      parameters:
        -
          name: employeeId
          in: path
          description: 'employeeId is the employee ID with whom the goal is associated.'
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - title
                - dueDate
                - sharedWithEmployeeIds
              properties:
                title:
                  description: 'The title of the goal'
                  type: string
                  example: 'New Goal To update'
                description:
                  description: 'A detailed description of the goal'
                  type: string
