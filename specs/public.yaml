              type: object
      responses:
        '200':
          description: 'Object containing `{ "result": "success" }` when the source is deleted.'
          content:
            application/json:
              schema:
                title: DeleteCompensationBenchmarkSourceResponse
                properties:
                  result: { type: string }
                type: object
        '400':
