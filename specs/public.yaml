                  type: string
                benchmarkValue:
                  description: 'Benchmark median value.'
                  type: number
                benchmarkMin:
                  description: 'Benchmark minimum value.'
                  type: number
                benchmarkMax:
                  description: 'Benchmark maximum value.'
                  type: number
                benchmarkSource:
                  description: 'Free-text label describing where the benchmark came from.'
                  type: string
                externalJobTitle:
                  type: string
                externalLocation:
                  type: string
                externalLevel:
                  type: string
                externalJobDescription:
                  type: string
                companiesSurveyed:
                  type: integer
                employeesSurveyed:
                  type: integer
