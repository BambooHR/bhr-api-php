          type: integer
          example: 0
        pageSize:
          description: 'The number of items per page.'
          type: integer
          example: 100
        totalPages:
          description: 'The total number of pages available.'
          type: integer
          example: 1
        totalItems:
          description: 'The total number of items available.'
          type: integer
          example: 10
      type: object
