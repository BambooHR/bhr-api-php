          required: false
          schema:
            type: integer
      responses:
        '200':
          description: 'Image bytes returned with Content-Type: image/jpeg. The payload may reflect the original upload format and is not guaranteed to be JPEG-encoded.'
          content:
            image/jpeg: {  }
