          type:
            - string
            - 'null'
        jobTitleId:
          description: 'ID of the job title associated with this time tracking record'
          type:
            - string
            - 'null'
        payCode:
          description: 'Pay code for this time tracking record'
          type:
            - string
            - 'null'
        dateHoursWorked:
          description: 'Date the hours were worked'
          type: string
