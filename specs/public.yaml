              schema:
                $ref: '#/components/schemas/ProblemDetailsResponse'
        '403':
          description: 'The authenticated caller lacks permission to modify compensation benchmarks.'
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsResponse'
        '500':
