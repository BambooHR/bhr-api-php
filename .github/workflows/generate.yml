name: Generate SDK

on:
  workflow_dispatch:

jobs:
  generate:
    name: Generate, lint, and test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      # Load the deploy key issued by GHM-375 so composer can fetch
      # bamboohr/phpcs over SSH (composer.lock records the SSH URL
      # git@github.com:BambooHR/phpcs.git, which the deploy key authorizes).
      #
      # ⚠️ SECURITY: this repository is PUBLIC. The deploy key grants read
      # access to a private repo. Do NOT add steps that print contents of
      # vendor/bamboohr/phpcs/** (or anything else from a private dep) to
      # workflow logs or upload them as artifacts — those become world-
      # readable. Stick to running tools against the installed files.
      - name: Load private-repo deploy key
        # v0.10.0 runs on Node 24. v0.9.0 is Node 20 and will break on
        # GitHub-hosted runners after the Node-20 removal window.
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.GHM_375_PRIVATE_REPO_DEPLOY_KEY }}

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          tools: composer
          coverage: none

      - name: Install Composer dependencies
        # --prefer-source (NOT --prefer-dist): forces composer to `git clone`
        # each package from its source URL. composer.lock records
        # `git@github.com:BambooHR/phpcs.git` for the private bamboohr/phpcs
        # dep, which the GHM-375 deploy key authorizes over SSH. With
        # --prefer-dist composer would instead try the GitHub Archive API
        # (`https://api.github.com/repos/.../zipball/...`), which is HTTPS
        # and returns 404 for private repos when the request isn't
        # API-authenticated (GitHub hides existence of private repos from
        # unauthenticated callers). The deploy key cannot help with that.
        run: composer install --prefer-source --no-progress --no-interaction

      - name: Pull OpenAPI Generator Docker image
        run: docker pull openapitools/openapi-generator-cli:v7.16.0

      - name: Generate SDK from committed spec
        run: make generate

      - name: Format generated code
        run: make format

      - name: Lint generated code
        run: make lint

      - name: Run autoload smoke test
        run: make smoke-test

      - name: Run unit tests
        run: make test
