name: Generate SDK

on:
  workflow_dispatch:

jobs:
  generate:
    name: Generate, lint, and test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Generate a GitHub App token (for private composer deps)
        # Per the BambooHR "Access other repos with your GitHub Action" doc
        # (https://bamboohr.slite.com/app/docs/9BqBAxIM14DJ-O), REPO_RO_APP_ID
        # and REPO_RO_APP_PRIVATE_KEY are the documented org-wide credentials
        # for granting a workflow read access to other BambooHR repos.
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.REPO_RO_APP_ID }}
          private-key: ${{ secrets.REPO_RO_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            phpcs

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          tools: composer
          coverage: none

      - name: Install Composer dependencies
        env:
          COMPOSER_AUTH: '{"github-oauth": {"github.com": "${{ steps.generate-token.outputs.token }}"}}'
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Pull OpenAPI Generator Docker image
        run: docker pull openapitools/openapi-generator-cli:v7.16.0

      - name: Generate SDK from committed spec
        run: make generate

      - name: Format generated code
        run: make format

      - name: Lint generated code
        run: make lint

      - name: Run autoload smoke test
        run: make smoke-test

      - name: Run unit tests
        run: make test
